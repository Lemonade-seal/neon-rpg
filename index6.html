<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>GREEN LINE NEON RPG - FULL WORLD</title>
<!-- build: party logs account delete neon login patch -->
<style>
  :root{--g:#00ff72;--gd:rgba(0,255,114,.55);--gf:rgba(0,255,114,.18);--gb:rgba(0,255,114,.075);--bg:#000;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none;caret-color:transparent;}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:var(--g);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Apple SD Gothic Neo","Noto Sans KR",monospace;touch-action:none;overscroll-behavior:none;}
  #wrap{position:fixed;inset:0;background:#000;overflow:hidden;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;background:#000;touch-action:none;}
  .hud{position:absolute;left:10px;right:10px;top:8px;z-index:5;display:grid;grid-template-columns:minmax(210px,280px) auto;gap:8px;pointer-events:none;align-items:start;justify-content:space-between;}
  .panel{border:1px solid var(--gd);box-shadow:0 0 14px var(--gb), inset 0 0 14px var(--gb);background:rgba(0,0,0,.72);border-radius:12px;padding:8px;}
  .stats{font-size:11px;line-height:1.25;display:grid;gap:4px;width:min(280px,calc(100vw - 136px));min-height:82px;}
  .row{display:flex;gap:6px;align-items:center;justify-content:space-between;white-space:nowrap;}
  .bar{height:6px;border:1px solid var(--gd);border-radius:999px;overflow:hidden;background:rgba(0,255,114,.06);}
  .fill{height:100%;width:50%;background:linear-gradient(90deg,rgba(0,255,114,.55),rgba(0,255,114,.95));box-shadow:0 0 10px var(--g);}
  .topBtns{display:flex;gap:6px;pointer-events:auto;align-items:flex-start;}
  .menuBtns{display:grid;grid-template-columns:repeat(2,52px);gap:5px;align-self:stretch;}
  .menuBtns button{height:38px;padding:4px 3px;font-size:11px;border-radius:9px;}
  button{background:#000;color:var(--g);border:1px solid var(--gd);border-radius:11px;padding:8px 9px;font-family:inherit;font-weight:800;box-shadow:0 0 10px var(--gb), inset 0 0 10px rgba(0,255,114,.05);touch-action:manipulation;}
  button:active{transform:translateY(1px);background:rgba(0,255,114,.12);}
  button:disabled{opacity:.32;}
  #zoneTag{position:absolute;left:50%;top:86px;transform:translateX(-50%);z-index:4;border:1px solid var(--gd);border-radius:999px;padding:5px 10px;background:rgba(0,0,0,.66);font-size:11px;box-shadow:0 0 12px var(--gb);pointer-events:none;}
  #joy{position:absolute;left:18px;bottom:28px;width:116px;height:116px;border:1px solid var(--gd);border-radius:50%;z-index:6;background:rgba(0,255,114,.03);box-shadow:0 0 18px var(--gb), inset 0 0 18px rgba(0,255,114,.04);touch-action:none;}
  #stick{position:absolute;left:38px;top:38px;width:40px;height:40px;border:2px solid var(--g);border-radius:50%;box-shadow:0 0 16px var(--gd);background:rgba(0,0,0,.85);}
  #actions{position:absolute;right:14px;bottom:24px;z-index:6;display:grid;grid-template-columns:62px 62px;gap:8px;}
  #actions button{height:54px;font-size:12px;line-height:1.05;padding:4px;}
  #talkPrompt{position:absolute;z-index:9;display:none;transform:translate(-50%,-100%);font-size:11px;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.88);white-space:nowrap;box-shadow:0 0 14px var(--gb), inset 0 0 10px rgba(0,255,114,.06);}
  .cool{font-size:10px;opacity:.8;display:block;margin-top:2px;}
  #mini{position:static;width:82px;height:82px;border:1px solid var(--gd);border-radius:12px;background:rgba(0,0,0,.72);z-index:5;box-shadow:0 0 13px var(--gb), inset 0 0 12px rgba(0,255,114,.04);}
  #popupLayer{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.74);padding:14px;}
  #popup{position:relative;width:min(430px,100%);max-height:88vh;overflow:auto;border:1px solid var(--g);border-radius:18px;background:#000;box-shadow:0 0 28px rgba(0,255,114,.26), inset 0 0 22px rgba(0,255,114,.05);padding:14px;}
  .popupCloseX{position:sticky;top:0;float:right;z-index:5;width:30px;height:30px;min-width:30px;padding:0;margin:-5px -5px 5px 8px;border-radius:9px;font-size:13px;line-height:1;background:#000;color:var(--g);border:1px solid var(--gd);box-shadow:0 0 10px var(--gb), inset 0 0 8px rgba(0,255,114,.06);}
  .codexHeader{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;padding:8px 9px;margin:-2px 0 8px;border-radius:10px;}
  .codexHeader h3{margin:0;font-size:14px;}
  .codexRows{display:grid;gap:6px;}
  .codexLine{border:1px solid rgba(0,255,114,.28);border-radius:10px;padding:7px;background:rgba(0,255,114,.035);font-size:11px;line-height:1.35;}
  .codexLine b{font-size:12px;}
  .neonStone{font-weight:900;text-shadow:0 0 8px rgba(0,255,114,.7);}
  .title{font-weight:900;font-size:18px;margin:0 0 8px;text-shadow:0 0 12px var(--gd);}
  .sub{font-size:12px;opacity:.85;line-height:1.45;margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
  .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
  .card{border:1px solid var(--gd);border-radius:14px;padding:10px;background:rgba(0,255,114,.045);box-shadow:inset 0 0 14px rgba(0,255,114,.045);font-size:12px;line-height:1.38;}
  .card h3{margin:0 0 5px;font-size:14px;}
  .card .small{font-size:10px;opacity:.8;}
  .selected{outline:2px solid var(--g);background:rgba(0,255,114,.13);}
  .rare-일반{border-color:rgba(0,255,114,.38)}.rare-레어{border-color:rgba(0,255,114,.55)}.rare-희귀{border-color:rgba(0,255,114,.72)}.rare-에픽{border-color:rgba(0,255,114,.88)}.rare-전설{border-color:var(--g);box-shadow:0 0 18px rgba(0,255,114,.18), inset 0 0 16px rgba(0,255,114,.08)}.rare-신화{border-color:#9dffcb;box-shadow:0 0 25px rgba(0,255,114,.32), inset 0 0 20px rgba(0,255,114,.12)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 10px;}.tabs button{font-size:11px;padding:7px 8px;}
  .footerBtns{display:flex;gap:8px;margin-top:12px;}.footerBtns button{flex:1;}
  .log{position:absolute;left:10px;right:10px;bottom:154px;z-index:4;min-height:28px;max-height:54px;overflow:hidden;font-size:11px;line-height:1.35;color:rgba(0,255,114,.9);pointer-events:none;text-shadow:0 0 6px rgba(0,255,114,.45);}
  #toast{position:absolute;left:50%;bottom:154px;transform:translateX(-50%);z-index:30;border:1px solid var(--gd);border-radius:999px;background:rgba(0,0,0,.86);padding:7px 12px;font-size:12px;display:none;box-shadow:0 0 16px var(--gb);}
  .rouletteWheel{position:relative;margin:8px auto 12px;width:210px;height:210px;border:2px solid var(--g);border-radius:50%;box-shadow:0 0 28px rgba(0,255,114,.28), inset 0 0 22px rgba(0,255,114,.08);transition:transform 2.1s cubic-bezier(.16,.84,.19,1);}
  .rouletteWheel:before,.rouletteWheel:after{content:"";position:absolute;inset:18px;border:1px dashed var(--gd);border-radius:50%;}.rouletteWheel:after{inset:58px;border-style:solid;}
  .pin{width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:22px solid var(--g);margin:0 auto -8px;filter:drop-shadow(0 0 8px var(--g));}
  .resultBox{text-align:center;border:1px solid var(--gd);border-radius:12px;padding:10px;margin-top:8px;background:rgba(0,255,114,.055);}
  .hidden{display:none!important;}
  @media (orientation:landscape){
    .hud{left:10px;right:10px;top:8px;grid-template-columns:270px auto;gap:10px;align-items:start;}
    .stats{width:270px;min-height:92px;font-size:10.5px;gap:3px;padding:7px;}
    .bar{height:5px;}
    #mini{width:92px;height:92px;border-radius:13px;}
    .menuBtns{grid-template-columns:repeat(2,58px);gap:6px;}
    .menuBtns button{height:43px;font-size:11px;}
    .topBtns{gap:8px;align-items:stretch;}
    #zoneTag{top:112px;}
    #joy{left:18px;bottom:18px;width:104px;height:104px;}
    #stick{left:34px;top:34px;width:36px;height:36px;}
    #actions{right:16px;bottom:16px;grid-template-columns:58px 58px;gap:7px;}
    #actions button{height:48px;font-size:11px;}
    .log{left:138px;right:150px;bottom:18px;max-height:44px;}
    #toast{bottom:76px;}
    #popup{width:min(620px,92vw);max-height:82vh;}
    .grid{grid-template-columns:repeat(3,minmax(0,1fr));}
  }
  @media (orientation:portrait){
    .hud{grid-template-columns:minmax(210px,1fr) auto;}
    .stats{max-width:280px;}
  }


  /* 세로/가로 화면 최적화 패치 */
  :root{
    --safe-top:env(safe-area-inset-top,0px);--safe-right:env(safe-area-inset-right,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);
    --hud-gap:6px;--mini-size:76px;--menu-btn-w:45px;--menu-gap:4px;--stat-w:clamp(138px,39vw,170px);--stat-font:10px;--stat-pad:6px;
    --joy-size:108px;--stick-size:36px;--action-w:58px;--action-h:50px;--action-gap:7px;--action-group-w:123px;--action-group-h:107px;--control-bottom:22px;--control-side:12px;--popup-w:430px;
  }
  html,body,#wrap{width:100vw;height:100dvh;min-height:100dvh;}
  .hud{left:calc(7px + var(--safe-left));right:calc(7px + var(--safe-right));top:calc(6px + var(--safe-top));display:flex;grid-template-columns:none;justify-content:space-between;align-items:flex-start;gap:var(--hud-gap);pointer-events:none;}
  .stats{width:var(--stat-w);max-width:none;min-width:0;min-height:var(--mini-size);padding:var(--stat-pad);font-size:var(--stat-font);gap:3px;line-height:1.16;overflow:hidden;}
  .row{gap:4px;min-width:0;}
  .row b,.row span{min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .bar{height:5px;}
  .topBtns{display:grid;grid-template-columns:var(--mini-size) calc(var(--menu-btn-w) * 2 + var(--menu-gap));gap:var(--hud-gap);align-items:stretch;height:var(--mini-size);pointer-events:auto;}
  #mini{width:var(--mini-size);height:var(--mini-size);border-radius:11px;}
  .menuBtns{display:grid;grid-template-columns:repeat(2,var(--menu-btn-w));gap:var(--menu-gap);height:var(--mini-size);align-self:stretch;}
  .menuBtns button{height:calc((var(--mini-size) - var(--menu-gap)) / 2);min-height:0;padding:2px 1px;font-size:10.5px;border-radius:8px;line-height:1;}
  #zoneTag{top:calc(var(--safe-top) + var(--mini-size) + 16px);font-size:10.5px;padding:4px 9px;max-width:calc(100vw - 24px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #joy{left:calc(var(--control-side) + var(--safe-left));bottom:calc(var(--control-bottom) + var(--safe-bottom));width:var(--joy-size);height:var(--joy-size);}
  #stick{width:var(--stick-size);height:var(--stick-size);left:calc((var(--joy-size) - var(--stick-size)) / 2);top:calc((var(--joy-size) - var(--stick-size)) / 2);}
  #actions{right:calc(var(--control-side) + var(--safe-right));bottom:calc(var(--control-bottom) + var(--safe-bottom));grid-template-columns:repeat(2,var(--action-w));gap:var(--action-gap);}
  #actions button{height:var(--action-h);font-size:11px;padding:3px;}
  .cool{font-size:9px;margin-top:1px;}
  .log{left:calc(9px + var(--safe-left));right:calc(9px + var(--safe-right));bottom:calc(var(--safe-bottom) + var(--action-group-h) + var(--control-bottom) + 14px);max-height:42px;font-size:10.5px;}
  #toast{bottom:calc(var(--safe-bottom) + var(--action-group-h) + var(--control-bottom) + 12px);max-width:calc(100vw - 40px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #popupLayer{padding:calc(12px + var(--safe-top)) calc(12px + var(--safe-right)) calc(12px + var(--safe-bottom)) calc(12px + var(--safe-left));}
  #popup{width:min(var(--popup-w),calc(100vw - var(--safe-left) - var(--safe-right) - 24px));max-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - 24px);}

  @media (max-width:374px) and (orientation:portrait){
    :root{--mini-size:68px;--menu-btn-w:41px;--hud-gap:4px;--stat-w:clamp(124px,37vw,140px);--stat-font:9.2px;--stat-pad:5px;--joy-size:96px;--stick-size:32px;--action-w:52px;--action-h:46px;--action-gap:6px;--action-group-w:110px;--action-group-h:98px;--control-side:9px;--control-bottom:18px;}
    .row:nth-child(5){font-size:8.8px;}
    #zoneTag{top:calc(var(--safe-top) + var(--mini-size) + 12px);}
  }
  @media (min-width:420px) and (orientation:portrait){
    :root{--mini-size:84px;--menu-btn-w:50px;--stat-w:clamp(185px,45vw,230px);--stat-font:10.8px;--stat-pad:7px;--joy-size:116px;--stick-size:40px;--action-w:62px;--action-h:54px;--action-group-w:132px;--action-group-h:115px;}
  }
  @media (orientation:landscape){
    :root{--mini-size:78px;--menu-btn-w:52px;--hud-gap:7px;--stat-w:clamp(214px,30vw,300px);--stat-font:10px;--stat-pad:6px;--joy-size:94px;--stick-size:32px;--action-w:56px;--action-h:45px;--action-gap:6px;--action-group-w:118px;--action-group-h:96px;--control-side:14px;--control-bottom:14px;--popup-w:720px;}
    .hud{left:calc(8px + var(--safe-left));right:calc(8px + var(--safe-right));top:calc(6px + var(--safe-top));}
    #zoneTag{top:calc(var(--safe-top) + var(--mini-size) + 13px);}
    .log{left:calc(var(--safe-left) + var(--joy-size) + 34px);right:calc(var(--safe-right) + var(--action-group-w) + 28px);bottom:calc(var(--safe-bottom) + 12px);max-height:38px;}
    #toast{bottom:calc(var(--safe-bottom) + 68px);}
    #popup{max-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - 20px);}
    .grid{grid-template-columns:repeat(3,minmax(0,1fr));}
    .grid3{grid-template-columns:repeat(3,minmax(0,1fr));}
  }
  @media (orientation:landscape) and (max-height:430px){
    :root{--mini-size:64px;--menu-btn-w:46px;--hud-gap:5px;--stat-w:clamp(194px,29vw,260px);--stat-font:9.2px;--stat-pad:5px;--joy-size:82px;--stick-size:28px;--action-w:50px;--action-h:39px;--action-gap:5px;--action-group-w:105px;--action-group-h:83px;--control-bottom:10px;}
    .bar{height:4px;}
    .menuBtns button{font-size:9.5px;border-radius:7px;}
    #actions button{font-size:10px;}
    .cool{font-size:8px;}
    #zoneTag{top:calc(var(--safe-top) + var(--mini-size) + 9px);}
  }
  @media (max-height:620px) and (orientation:portrait){
    :root{--joy-size:96px;--stick-size:32px;--action-w:54px;--action-h:46px;--action-gap:6px;--action-group-w:114px;--action-group-h:98px;--control-bottom:14px;}
    .log{max-height:34px;}
  }


  /* 표시 복구 + 세로 HUD 정렬 패치 */
  #wrap,#game{display:block!important;visibility:visible!important;opacity:1!important;}
  .hud{width:auto;max-width:none;}
  .stats{flex:1 1 auto;width:auto!important;max-width:none!important;min-width:0;}
  .statStack{flex:1 1 auto;}
  .topBtns{flex:0 0 auto;}
  .statHeader{display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap;margin-bottom:2px;}
  .meter{display:grid;gap:3px;margin-top:5px;}
  .meter+.meter{margin-top:8px;}
  .meterLabel{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:.95em;white-space:nowrap;opacity:.92;}
  .meterLabel span{min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .statFooter{display:flex;justify-content:space-between;gap:6px;margin-top:7px;white-space:nowrap;opacity:.92;}
  .statFooter span{min-width:0;overflow:hidden;text-overflow:ellipsis;}
  @media (orientation:portrait){
    .hud{display:flex!important;left:calc(7px + var(--safe-left));right:calc(7px + var(--safe-right));gap:6px;align-items:flex-start;}
    .stats{flex:1 1 auto;min-height:var(--mini-size);padding:7px;}
    .topBtns{flex:0 0 auto;}
  }
  @media (max-width:374px) and (orientation:portrait){
    .hud{gap:4px;}
    .stats{padding:5px;}
    .meter+.meter{margin-top:5px;}
    .statFooter{margin-top:5px;font-size:8.7px;}
  }
  @media (min-width:420px) and (orientation:portrait){
    .hud{gap:8px;}
    .stats{padding:8px;}
  }


  /* 요청 반영: 장소 표시를 미니맵/기능버튼 바로 아래 빈칸에 고정 */
  .topBtns{
    display:grid!important;
    grid-template-columns:var(--mini-size) calc(var(--menu-btn-w) * 2 + var(--menu-gap))!important;
    grid-template-rows:var(--mini-size) 24px!important;
    gap:var(--hud-gap)!important;
    height:auto!important;
    align-items:stretch!important;
  }
  .topBtns #zoneTag{
    position:static!important;
    left:auto!important;right:auto!important;top:auto!important;bottom:auto!important;
    transform:none!important;
    grid-column:1 / -1;
    width:100%;height:24px;max-width:none;
    display:flex;align-items:center;justify-content:center;
    padding:0 8px;margin:0;
    border-radius:9px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    font-size:10.5px;line-height:1;
    background:rgba(0,0,0,.72);
    pointer-events:auto!important;
    cursor:pointer;
  }
  @media (orientation:landscape){.topBtns{grid-template-rows:var(--mini-size) 23px!important}.topBtns #zoneTag{height:23px;font-size:10px}}
  @media (max-width:374px) and (orientation:portrait){.topBtns{grid-template-rows:var(--mini-size) 21px!important}.topBtns #zoneTag{height:21px;font-size:9.5px}}


  /* 확장 패치: 스킬 3슬롯 / 오토 / 상태 표시 */
  #actions{grid-template-columns:repeat(2,var(--action-w))!important;grid-template-rows:repeat(4,var(--action-h))!important;gap:var(--action-gap)!important;}
  .statusLine{display:flex;justify-content:space-between;gap:6px;margin-top:6px;font-size:.92em;white-space:nowrap;opacity:.95;}
  .statusLine span{min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .questHudText{font-weight:900;text-shadow:0 0 8px rgba(0,255,114,.55);}
  .compactHud .statHeader{margin-bottom:4px;font-size:.98em;line-height:1.05;}
  .compactHud .statHeader b{min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .compactMeter{display:grid;grid-template-columns:22px minmax(44px,1fr) auto;align-items:center;gap:5px;margin-top:3px;white-space:nowrap;}
  .compactMeter .meterKey{font-weight:900;font-size:.95em;text-shadow:0 0 7px rgba(0,255,114,.55);}
  .compactMeter .bar{height:6px;min-width:0;}
  .compactMeter .meterValue{font-size:.88em;opacity:.94;text-align:right;min-width:47px;}
  .currencyBox{display:flex;justify-content:space-between;gap:6px;margin-top:6px;padding:4px 7px;border:1px solid rgba(0,255,114,.38);border-radius:8px;background:rgba(0,255,114,.045);box-shadow:inset 0 0 9px rgba(0,255,114,.045);font-size:.9em;line-height:1.05;white-space:nowrap;}
  .currencyBox span{min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .currencyBox b{font-weight:900;text-shadow:0 0 7px rgba(0,255,114,.55);}
  .statStack{display:flex;flex-direction:column;gap:5px;flex:1 1 auto;min-width:0;width:auto!important;max-width:none!important;pointer-events:none;}
  .statStack #statPanel{width:100%!important;max-width:none!important;min-height:auto!important;}
  .currencyPanel{width:100%;min-height:0!important;padding:5px 8px!important;font-size:10px;line-height:1.05;}
  .currencyPanel .currencyRow{display:flex;align-items:center;justify-content:space-between;gap:8px;white-space:nowrap;}
  .currencyPanel span{min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .currencyPanel b{font-weight:900;text-shadow:0 0 7px rgba(0,255,114,.55);}
  .autoOn{box-shadow:0 0 16px rgba(0,255,114,.32), inset 0 0 16px rgba(0,255,114,.16)!important;background:rgba(0,255,114,.12)!important;}
  .rouletteOdds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 10px;}
  .rouletteOdds .card{text-align:center;padding:8px 5px;}
  .townNote{font-size:10px;opacity:.75;margin-top:5px;line-height:1.3;}
  @media (orientation:portrait){:root{--action-group-h:230px;}}
  @media (orientation:landscape){:root{--action-group-h:198px;}}
  @media (orientation:landscape) and (max-height:430px){:root{--action-group-h:173px;}#actions button{font-size:9.5px;}}


  /* 안정화 패치: 요청 버튼 배치 */
  #leftQuick{
    position:absolute;
    left:calc(var(--control-side) + var(--safe-left));
    bottom:calc(var(--safe-bottom) + var(--control-bottom) + var(--joy-size) + 8px);
    width:var(--joy-size);
    z-index:6;
    display:grid;
    grid-template-columns:1fr 1fr;

    grid-template-rows:repeat(3,var(--action-h))!important;
    grid-template-areas:
      "skill3 skill4"
      "skill1 skill2"
      "attack dodge"!important;
    gap:var(--action-gap)!important;
  }
  #skillBtn4{grid-area:skill4;}
  #skillBtn3{grid-area:skill3;width:auto;justify-self:stretch;}
  #skillBtn1{grid-area:skill1;}
  #skillBtn2{grid-area:skill2;}
  #attackBtn{grid-area:attack;}
  #dodgeBtn{grid-area:dodge;}
  #potionBtn,#autoBtn{width:100%;}
  @media (orientation:portrait){:root{--action-group-h:calc(var(--action-h) * 3 + var(--action-gap) * 2);}}
  @media (orientation:landscape){:root{--action-group-h:calc(var(--action-h) * 3 + var(--action-gap) * 2);}#leftQuick button{height:32px;font-size:10px;}}
  @media (orientation:landscape) and (max-height:430px){#leftQuick{bottom:calc(var(--safe-bottom) + var(--control-bottom) + var(--joy-size) + 5px);gap:4px;}#leftQuick button{height:28px;font-size:9.5px;}}

  /* 물약 설정 게이지: 바탕 제거, 얇은 선만 표시 */
  .neonRange{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:30px;          /* 터치 영역은 넓게 */
    padding:13px 0;
    border:0;
    background:transparent;
    box-shadow:none;
    outline:none;
    touch-action:pan-x;
  }
  .neonRange::-webkit-slider-runnable-track{
    height:2px;
    border-radius:999px;
    background:rgba(0,255,114,.9);
    box-shadow:0 0 8px rgba(0,255,114,.45);
  }
  .neonRange::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:12px;
    height:16px;
    margin-top:-7px;
    border-radius:3px;
    border:1px solid rgba(0,255,114,.95);
    background:#000;
    box-shadow:0 0 8px rgba(0,255,114,.55);
  }
  .neonRange::-moz-range-track{
    height:2px;
    border:0;
    border-radius:999px;
    background:rgba(0,255,114,.9);
    box-shadow:0 0 8px rgba(0,255,114,.45);
  }
  .neonRange::-moz-range-thumb{
    width:12px;
    height:16px;
    border-radius:3px;
    border:1px solid rgba(0,255,114,.95);
    background:#000;
    box-shadow:0 0 8px rgba(0,255,114,.55);
  }
  .neonRangeWrap{
    position:relative;
    padding:12px 6px 2px;
  }
  .neonRangeText{
    display:flex;
    justify-content:space-between;
    font-size:10px;
    opacity:.82;
    margin-top:4px;
  }
  .rangeBubble{
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    min-width:34px;
    height:18px;
    padding:2px 6px;
    border:1px solid rgba(0,255,114,.55);
    border-radius:999px;
    background:rgba(0,0,0,.9);
    color:#00ff72;
    font-size:10px;
    line-height:12px;
    text-align:center;
    box-shadow:0 0 8px rgba(0,255,114,.25), inset 0 0 6px rgba(0,255,114,.08);
    pointer-events:none;
    white-space:nowrap;
  }
  .neonRange:active::-webkit-slider-thumb{
    transform:scale(1.08);
    box-shadow:0 0 12px rgba(0,255,114,.75);
  }
  .neonRange:active::-moz-range-thumb{
    transform:scale(1.08);
    box-shadow:0 0 12px rgba(0,255,114,.75);
  }

  /* 룰렛 원판: 원판 안에 확률 구간 표시 + 상단 고정 눈금 */
  .rouletteCase{position:relative;width:230px;margin:4px auto 12px;}
  .topTick{
    position:absolute;
    left:50%;
    top:-3px;
    transform:translateX(-50%);
    z-index:3;
    width:2px;
    height:32px;
    background:var(--g);
    box-shadow:0 0 10px rgba(0,255,114,.8);
    border-radius:999px;
  }
  .topTick:before{
    content:"";
    position:absolute;
    left:50%;
    top:-5px;
    transform:translateX(-50%);
    width:16px;
    height:8px;
    border:1px solid var(--g);
    background:#000;
    border-radius:2px;
    box-shadow:0 0 10px rgba(0,255,114,.55);
  }
  .rouletteWheel{
    position:relative;
    margin:10px auto 12px;
    width:220px;
    height:220px;
    border:2px solid var(--g);
    border-radius:50%;
    background:
      conic-gradient(from -90deg,
        rgba(0,255,114,.10) 0deg 216deg,
        rgba(0,255,114,.24) 216deg 342deg,
        rgba(0,255,114,.46) 342deg 360deg);
    box-shadow:0 0 24px rgba(0,255,114,.25), inset 0 0 20px rgba(0,255,114,.06);
    transition:transform 2.1s cubic-bezier(.16,.84,.19,1);
    overflow:hidden;
  }
  .rouletteWheel:before,.rouletteWheel:after{
    content:"";
    position:absolute;
    inset:18px;
    border:1px dashed rgba(0,255,114,.45);
    border-radius:50%;
  }
  .rouletteWheel:after{inset:62px;border-style:solid;}
  .wheelLine{position:absolute;left:50%;top:50%;width:1px;height:110px;background:rgba(0,255,114,.55);transform-origin:bottom center;}
  .wheelLine.l60{transform:translate(-50%,-100%) rotate(216deg);}
  .wheelLine.l95{transform:translate(-50%,-100%) rotate(342deg);}
  .wheelText{
    position:absolute;
    left:50%;
    top:50%;
    width:78px;
    font-size:10px;
    line-height:1.25;
    text-align:center;
    color:var(--g);
    text-shadow:0 0 8px rgba(0,255,114,.7);
    pointer-events:none;
  }
  .wheelText.fail{transform:translate(-50%,-50%) rotate(108deg) translateY(-70px) rotate(-108deg);}
  .wheelText.two{transform:translate(-50%,-50%) rotate(279deg) translateY(-70px) rotate(-279deg);}
  .wheelText.three{transform:translate(-50%,-50%) rotate(351deg) translateY(-70px) rotate(-351deg);font-weight:900;}

  /* 스킬 버튼: 이름 표시, 긴 이름 이동, 쿨타임 음영 */
  #actions button{
    position:relative;
    overflow:hidden;
    --cdp:0%;
  }
  #actions button::before{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:var(--cdp,0%);
    background:rgba(0,255,114,.20);
    box-shadow:inset 0 0 12px rgba(0,255,114,.18);
    pointer-events:none;
    transition:height .12s linear;
    z-index:0;
  }
  #actions button .skillName,#actions button .cool{
    position:relative;
    z-index:1;
  }
  .skillName{
    display:block;
    width:100%;
    overflow:hidden;
    white-space:nowrap;
    line-height:1.08;
  }
  .skillName.marquee{
    display:inline-block;
    min-width:100%;
    animation:skillNameSlide 3.4s linear infinite;
  }
  @keyframes skillNameSlide{
    0%,18%{transform:translateX(0)}
    76%{transform:translateX(-42%)}
    100%{transform:translateX(0)}
  }

  /* 룰렛: 다수 구역 방식 */
  .rouletteCase.multiCase{position:relative;width:246px;margin:4px auto 12px;}
  .rouletteWheel.multi{
    width:230px;height:230px;
    background:repeating-conic-gradient(from -90deg,
      rgba(0,255,114,.10) 0deg 30deg,
      rgba(0,255,114,.18) 30deg 60deg);
    overflow:hidden;
  }
  .rouletteWheel.multi:before{inset:20px;border:1px dashed rgba(0,255,114,.38);}
  .rouletteWheel.multi:after{inset:68px;border:1px solid rgba(0,255,114,.52);}
  .wheelCut{
    position:absolute;
    left:50%;top:50%;
    width:1px;height:115px;
    transform-origin:bottom center;
    background:rgba(0,255,114,.42);
    box-shadow:0 0 5px rgba(0,255,114,.45);
  }
  .wheelSeg{
    position:absolute;
    left:50%;top:50%;
    width:58px;
    font-size:10px;
    line-height:1;
    text-align:center;
    color:var(--g);
    text-shadow:0 0 7px rgba(0,255,114,.75);
    pointer-events:none;
  }
  .wheelHub{
    position:absolute;
    left:50%;top:50%;
    width:42px;height:42px;
    transform:translate(-50%,-50%);
    border:1px solid var(--g);
    border-radius:50%;
    background:#000;
    box-shadow:0 0 12px rgba(0,255,114,.35), inset 0 0 10px rgba(0,255,114,.08);
    z-index:2;
  }

  /* 스킬명 잘림 보정: 버튼 안에서 이름 영역 확보 + 긴 이름은 전체 글자 이동 */
  #actions button{
    display:flex!important;
    flex-direction:column!important;
    align-items:center!important;
    justify-content:center!important;
    gap:1px!important;
    padding:2px!important;
    min-width:0!important;
    overflow:hidden!important;
  }
  #actions button .skillName{
    display:block!important;
    max-width:100%!important;
    width:100%!important;
    min-height:12px!important;
    font-size:8px!important;
    line-height:1.15!important;
    letter-spacing:-.7px!important;
    overflow:hidden!important;
    white-space:nowrap!important;
    text-overflow:clip!important;
    box-sizing:border-box!important;
  }
  #actions button .skillName.marquee{
    width:max-content!important;
    min-width:100%!important;
    max-width:none!important;
    overflow:visible!important;
    padding-left:2px!important;
    padding-right:18px!important;
    animation:skillNameSlideFull 4.2s linear infinite!important;
  }
  @keyframes skillNameSlideFull{
    0%,16%{transform:translateX(0)}
    76%{transform:translateX(calc(-100% + var(--action-w) - 8px))}
    100%{transform:translateX(0)}
  }
  #actions button .cool{
    font-size:7.5px!important;
    line-height:1!important;
    margin-top:0!important;
  }

  /* 시작/업데이트 화면 */
  .bootScreen{text-align:center;padding:18px 8px;min-height:360px;display:flex;flex-direction:column;justify-content:center;gap:16px;}
  .gameTitle{font-size:28px;font-weight:900;letter-spacing:2px;color:var(--g);text-shadow:0 0 12px rgba(0,255,114,.75),0 0 28px rgba(0,255,114,.35);}
  .blinkStart{font-size:13px;color:var(--g);animation:blinkGlow 1.15s ease-in-out infinite;text-shadow:0 0 10px rgba(0,255,114,.8);}
  @keyframes blinkGlow{0%,100%{opacity:.45;filter:brightness(.8)}50%{opacity:1;filter:brightness(1.55)}}
  .bootPanel{border:1px solid rgba(0,255,114,.48);border-radius:16px;padding:16px;background:rgba(0,255,114,.04);box-shadow:inset 0 0 14px rgba(0,255,114,.06),0 0 16px rgba(0,255,114,.12);}
  .patchNoteBox{text-align:left;line-height:1.55;font-size:12px;border:1px solid rgba(0,255,114,.35);border-radius:12px;padding:12px;margin-top:10px;background:rgba(0,0,0,.55);}

  /* 업데이트 진행 게이지 */
  .updateProgressBox{
    width:100%;
    max-width:360px;
    margin:0 auto;
    text-align:left;
  }
  .updateProgressTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    color:var(--g);
    margin-bottom:6px;
    opacity:.9;
  }
  .updateTrack{
    position:relative;
    width:100%;
    height:9px;
    border:1px solid rgba(0,255,114,.58);
    border-radius:999px;
    background:transparent;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,255,114,.18);
  }
  .updateFill{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg,rgba(0,255,114,.65),rgba(130,255,185,.95));
    box-shadow:0 0 12px rgba(0,255,114,.65);
    transition:width .12s linear;
  }
  .updateStatus{
    margin-top:8px;
    font-size:11px;
    color:rgba(0,255,114,.86);
    min-height:16px;
  }

  /* 스킬 버튼 이름: 애니메이션 제거, 두 줄 표시 */
  #actions button .skillName,
  #actions button .skillName.marquee{
    display:block!important;
    width:100%!important;
    max-width:100%!important;
    min-width:0!important;
    min-height:20px!important;
    max-height:22px!important;
    white-space:normal!important;
    overflow:visible!important;
    text-overflow:clip!important;
    animation:none!important;
    transform:none!important;
    font-size:9px!important;
    line-height:1.08!important;
    letter-spacing:-.5px!important;
    padding:0 1px!important;
    word-break:keep-all!important;
    overflow-wrap:anywhere!important;
  }
  #actions button .cool{font-size:7px!important;line-height:1!important;margin-top:1px!important;}


  /* HUD 하단 정렬 패치: 로케이션 박스와 골드/네온 박스 밑단 맞춤 */
  :root{--location-box-h:24px;}
  .topBtns{grid-template-rows:var(--mini-size) var(--location-box-h)!important;}
  .topBtns #zoneTag{height:var(--location-box-h)!important;}
  .statStack{gap:var(--hud-gap)!important;}
  .statStack #statPanel{min-height:var(--mini-size)!important;}
  .currencyPanel{
    height:var(--location-box-h)!important;
    padding:0 8px!important;
    display:flex!important;
    align-items:center!important;
  }
  .currencyPanel .currencyRow{width:100%;}
  @media (orientation:landscape){:root{--location-box-h:23px;}}
  @media (max-width:374px) and (orientation:portrait){:root{--location-box-h:21px;}}


  /* HUD/버튼 정리 패치: 골드박스 로케이션 박스형, 공격/회피 소형화, 스킬3/4 위치 교체 */
  .currencyPanel{
    border:1px solid var(--gd)!important;
    border-radius:9px!important;
    background:rgba(0,0,0,.72)!important;
    box-shadow:0 0 12px var(--gb), inset 0 0 10px rgba(0,255,114,.06)!important;
    padding:0 8px!important;
    font-size:10.5px!important;
    line-height:1!important;
  }
  .currencyPanel .currencyRow{
    height:100%;
    display:flex!important;
    align-items:center!important;
    justify-content:center!important;
    gap:12px!important;
  }
  #attackBtn,#dodgeBtn{
    width:calc((var(--joy-size) - 6px) / 2)!important;
    height:36px!important;
    justify-self:center!important;
    align-self:center!important;
    border-radius:10px!important;
    font-size:11px!important;
    padding:3px!important;
  }
  @media (orientation:landscape){
    #attackBtn,#dodgeBtn{height:32px!important;font-size:10px!important;}
  }
  @media (orientation:landscape) and (max-height:430px){
    #attackBtn,#dodgeBtn{width:calc((var(--joy-size) - 4px) / 2)!important;height:28px!important;font-size:9.5px!important;}
  }



  /* HUD 세부 정렬 패치: 골드/네온 중앙 경계선 + 조작 버튼 기준선 정렬 */
  .currencyPanel .currencyRow{
    position:relative!important;
    width:100%!important;
    height:100%!important;
    display:grid!important;
    grid-template-columns:1fr 1fr!important;
    align-items:center!important;
    justify-content:stretch!important;
    gap:0!important;
  }
  .currencyPanel .currencyRow::before{
    content:"";
    position:absolute;
    left:50%;
    top:4px;
    bottom:4px;
    width:1px;
    background:rgba(0,255,114,.48);
    box-shadow:0 0 7px rgba(0,255,114,.35);
    pointer-events:none;
  }
  .currencyPanel .currencyRow span{
    display:block!important;
    min-width:0!important;
    overflow:hidden!important;
    text-overflow:ellipsis!important;
    white-space:nowrap!important;
    text-align:left!important;
    justify-self:stretch!important;
  }
  .currencyPanel .currencyRow span:first-child{padding-left:2px!important;padding-right:8px!important;}
  .currencyPanel .currencyRow span:last-child{padding-left:10px!important;padding-right:2px!important;}

  :root{--quick-btn-h:36px;--attack-btn-h:36px;--action-span-h:calc(var(--joy-size) + 8px + var(--quick-btn-h));--skill-row-h:calc((var(--action-span-h) - var(--attack-btn-h) - (var(--action-gap) * 2)) / 2);}
  #leftQuick button{height:var(--quick-btn-h)!important;}
  #actions{
    bottom:calc(var(--control-bottom) + var(--safe-bottom))!important;
    grid-template-rows:var(--skill-row-h) var(--skill-row-h) var(--attack-btn-h)!important;
  }
  #skillBtn1,#skillBtn2,#skillBtn3,#skillBtn4{
    height:100%!important;
    align-self:stretch!important;
    justify-self:stretch!important;
  }
  #attackBtn,#dodgeBtn{
    height:var(--attack-btn-h)!important;
    align-self:end!important;
    justify-self:center!important;
  }
  @media (orientation:landscape){:root{--quick-btn-h:32px;--attack-btn-h:32px;}}
  @media (orientation:landscape) and (max-height:430px){:root{--quick-btn-h:28px;--attack-btn-h:28px;}}



  /* 버튼 가로 간격 정렬 패치: 스킬/공격/회피를 오토·물약 간격 기준으로 통일 */
  :root{--quick-gap:6px;}
  #leftQuick{gap:var(--quick-gap)!important;}
  #actions{
    width:var(--joy-size)!important;
    grid-template-columns:repeat(2,calc((var(--joy-size) - var(--quick-gap)) / 2))!important;
    column-gap:var(--quick-gap)!important;
    row-gap:var(--action-gap)!important;
  }
  #skillBtn1,#skillBtn2,#skillBtn3,#skillBtn4,#attackBtn,#dodgeBtn{
    width:100%!important;
    justify-self:stretch!important;
  }
  @media (orientation:landscape) and (max-height:430px){
    :root{--quick-gap:4px;}
  }



  /* 파티/로그/로그인 UI 패치 */
  .statStack,#statPanel{pointer-events:auto!important;}
  #statPanel{cursor:pointer;}
  .kakaoLoginCenter{display:flex;justify-content:center;align-items:center;margin:6px 0 2px;}
  .kakaoNeonBtn{
    width:min(280px,82%);
    height:52px;
    border-radius:16px;
    background:#000!important;
    color:var(--g)!important;
    border:1px solid var(--g)!important;
    box-shadow:0 0 18px rgba(0,255,114,.28), inset 0 0 18px rgba(0,255,114,.08)!important;
    text-shadow:0 0 8px rgba(0,255,114,.8);
    letter-spacing:.5px;
  }
  .partyMiniList{display:grid;gap:6px;margin-top:8px;}
  .partyMiniLine{border:1px solid rgba(0,255,114,.32);border-radius:10px;padding:7px 8px;background:rgba(0,255,114,.035);font-size:11px;line-height:1.35;}
  .partyChatBox{max-height:120px;overflow:auto;border:1px solid rgba(0,255,114,.32);border-radius:10px;padding:8px;background:rgba(0,255,114,.025);font-size:11px;line-height:1.35;margin-top:8px;}
  .neonInput{width:100%;font:inherit;padding:10px;background:#000;color:var(--g);border:1px solid var(--gd);border-radius:10px;user-select:text;-webkit-user-select:text;caret-color:var(--g);}

<body>
<div id="wrap">

function skillExtraEntry(id,idx){
  const raw=SKILL_EXTRA_11_12[id];
  if(Array.isArray(raw)&&raw[idx])return Array.isArray(raw[idx])?{name:raw[idx][0],desc:raw[idx][1]}:{name:raw[idx],desc:null};
  return null;
}
function extendSkillBooksToMax(){
  for(const id in SKILL_BOOK){
    const list=SKILL_BOOK[id]; if(!Array.isArray(list))continue;
    while(list.length<MAX_SKILL_STAR){
      const lv=list.length+1, extra=skillExtraEntry(id,lv-11);
      list.push(extra||{name:`${lv}성 특수기`,desc:`${id} 계열 ${lv}성 특수 스킬. 이전 스킬을 단순 강화하지 않고 별도 방식으로 발동한다.`});
    }
    if(list.length>MAX_SKILL_STAR)list.length=MAX_SKILL_STAR;
  }
}
extendSkillBooksToMax();
function skillList(jobId=player.job){const direct=SKILL_BOOK[jobId];if(direct)return direct;const jb=jobById(jobId||'blade');if(jb&&jb.skillBase&&SKILL_BOOK[jb.skillBase])return SKILL_BOOK[jb.skillBase];return SKILL_BOOK.blade;}
function skillStar(jobId=player.job){
  player.skillStars = player.skillStars || {};
  return clamp(Number(player.skillStars[jobId]||0),0,MAX_SKILL_STAR);
}
function skillByRank(jobId=player.job, rank=skillStar(jobId)){
  const list=skillList(jobId); const r=clamp(Number(rank)||1,1,MAX_SKILL_STAR);
  return list[r-1] || list[0];
}
function skillInfo(jobId=player.job){
  const s=skillStar(jobId);
  return s>0?skillByRank(jobId,s):{name:'미습득', desc:`다음 스킬: ${skillByRank(jobId,1).name} · ${skillByRank(jobId,1).desc}`};
}
function skillCost(jobId=player.job){const s=skillStar(jobId); return s>=MAX_SKILL_STAR?0:(skillByRank(jobId,s+1).cost||SKILL_COSTS[s]);}
function skillScale(rank=skillStar()){
  rank=clamp(rank,0,MAX_SKILL_STAR);
  return {
    power:.72+rank*.09,
    radius:.92+rank*.045,
    duration:.92+rank*.055,
    countBonus:Math.floor((rank+1)/3),
    cooldown:Math.max(.66,1-rank*.022)
  };
}
function skillStageText(jobId=player.job){const s=skillStar(jobId); return s>=MAX_SKILL_STAR?`${MAX_SKILL_STAR}성 스킬 보유`:s>0?`${s}성 ${skillByRank(jobId,s).name}`:'미습득';}

function monsterNameFor(f,i){
  f=f||{};
  const list=Array.isArray(FIELD_MONSTER_NAMES[f.id])?FIELD_MONSTER_NAMES[f.id]:[];
  const n=list.length?list[((Number(i)||0)%list.length+list.length)%list.length]:'';
  return n||`${f.theme||f.name||'필드'} 몬스터 ${((Number(i)||0)+1)}`;
}
function uniqueMonsterNameForField(f,idx,boss=false){
  f=f||{};
  if(boss)return f.boss||`${f.name||'필드'} 보스`;
  const live=new Set((Array.isArray(monsters)?monsters:[]).filter(m=>m&&!m.dead).map(m=>m.name));
  const list=Array.isArray(FIELD_MONSTER_NAMES[f.id])?FIELD_MONSTER_NAMES[f.id]:[];
  if(list.length){
    for(let step=0;step<list.length;step++){
      const n=list[((Number(idx)||0)+step)%list.length];
      if(n&&!live.has(n))return n;
    }
  }
  monsterNameSerial=(Number(monsterNameSerial)||0)+1;
  let n=`${f.name||'필드'} 개체 ${monsterNameSerial}`;
  while(live.has(n)){monsterNameSerial=(monsterNameSerial+1)%9999;n=`${f.name||'필드'} 개체 ${monsterNameSerial}`;}
  return n;
}
function makeMonsterBook(){
  const book={};
  for(const f of FIELDS.filter(x=>x.id!=='town')){
    book[f.id]=[];
    for(let i=0;i<10;i++) book[f.id].push({name:monsterNameFor(f,i), shape:i, boss:false, seen:0,kills:0});
    book[f.id].push({name:f.boss||`${f.name} 보스`, shape:10, boss:true, seen:0,kills:0});
  }
  return book;
}

async function initPartyPresence(){
  const client=await ensureSupabaseClient(false);
  if(!client||!cloudState.user)return false;
  if(onlineState.channel&&onlineState.enabled)return true;
  onlineState.client=client;
  try{
    const channel=client.channel('neon-rpg-party-v1',{config:{presence:{key:myOnlineId()}}});
    onlineState.channel=channel;
    channel
      .on('presence',{event:'sync'},syncOnlinePresence)
      .on('broadcast',{event:'party_invite'},({payload})=>handlePartyInvite(payload))
      .on('broadcast',{event:'party_accept'},({payload})=>handlePartyAccept(payload))
      .on('broadcast',{event:'party_leave'},({payload})=>handlePartyLeave(payload))
      .on('broadcast',{event:'party_chat'},({payload})=>handlePartyChat(payload))
      .subscribe(async status=>{
        onlineState.status=status;
        if(status==='SUBSCRIBED'){
          onlineState.enabled=true;
          await trackOnlinePresence(true);
          msg('파티 채널 접속', 'system');
        }
      });
    return true;
  }catch(e){console.error(e);onlineState.enabled=false;onlineState.status='오류';return false;}
}
function syncOnlinePresence(){
  const ch=onlineState.channel;if(!ch)return;
  const state=ch.presenceState();const now=performance.now();const next={};const me=myOnlineId();
  Object.keys(state||{}).forEach(key=>{
    const arr=state[key]||[];
    for(const p of arr){
      if(!p||p.id===me)continue;
      next[p.id]=Object.assign({},p,{seenAt:now});
    }
  });
  onlineState.peers=next;
}

function computeStats(){
  const job=player.job?jobById(player.job):JOBS[0];
  const s=Object.assign({atk:5,hp:100,def:0,speed:120,aspd:1,crit:0,critDmg:.5,lifesteal:0,hpRegen:0,skillPower:1,range:80,dodge:0,reflect:0,expBonus:0,goldBonus:0,summonPower:1,cooldown:0,mpRegen:0,magnet:80},job.base||{});
  s.atk += (player.level-1)*1.6; s.hp += (player.level-1)*9; s.def += Math.floor((player.level-1)/3);
  for(const g of player.growths) applyStat(s,g.stat,g.value);
  for(const slot in player.equip){const item=player.equip[slot]; if(item) for(const k in item.stats) applyStat(s,k,item.stats[k]);}
  s.speed*=1+buffMod('speed'); s.aspd+=buffMod('aspd'); s.skillPower+=buffMod('skillPower'); s.def+=buffMod('def');
  s.maxHp=Math.max(1,Math.round(s.hp)); s.speed=clamp(s.speed,80,260); s.aspd=clamp(s.aspd,.45,3.8); s.crit=clamp(s.crit,0,.85); s.lifesteal=clamp(s.lifesteal,0,.65); s.dodge=clamp(s.dodge,0,.55); s.reflect=clamp(s.reflect,0,1.2); s.cooldown=clamp(s.cooldown,0,.55); s.magnet=clamp(s.magnet||80,40,520);
  return s;
}
function applyStat(s,k,v){

  if(k in s) s[k]+=v;
}

    used.add(n);return n;
  });

  }

function ensureCodexForField(f){
  if(!f||!f.id||f.id==='town')return;
  if(!player.codex||typeof player.codex!=='object')player.codex=makeMonsterBook();
  if(!Array.isArray(player.codex[f.id]))player.codex[f.id]=[];
  for(let i=0;i<10;i++){
    const prev=(player.codex[f.id]&&player.codex[f.id][i]&&typeof player.codex[f.id][i]==='object')?player.codex[f.id][i]:{};
    player.codex[f.id][i]=Object.assign({seen:0,kills:0},prev,{name:monsterNameFor(f,i),shape:i,boss:false});
  }
  const prevBoss=(player.codex[f.id]&&player.codex[f.id][10]&&typeof player.codex[f.id][10]==='object')?player.codex[f.id][10]:{};
  player.codex[f.id][10]=Object.assign({seen:0,kills:0},prevBoss,{name:f.boss||`${f.name} 보스`,shape:10,boss:true});
}
function monsterIsRanged(idx,boss=false,level=1){
  if(boss)return true;
  const n=Number(idx)||0;
  // 근접형 위주. 일반 몬스터는 8~9번 상급 개체만 원거리형으로 둔다.
  return n>=8;
}

function monsterCanMoveShoot(m){
  if(!m)return false;
  if(m.boss)return true;
  // 이동하면서 공격하는 원거리 몬스터는 상급 원거리 개체에만 적용한다.
  return !!m.elite && Number(m.shape)>=9;
}
function monsterProjectileKind(idx,boss=false){
  if(boss)return 'curse';
  const k=(Number(idx)||0)%5;
  if(k===2)return 'missile';
  if(k===3)return 'curse';
  if(k===4)return 'spirit';
  if(k===1)return 'arrow';
  return 'magic';
}
function fireMonsterProjectile(m){
  if(!m||m.dead)return;
  const a=Math.atan2(player.y-m.y,player.x-m.x);
  const kind=m.projectileKind||monsterProjectileKind(m.shape,m.boss);
  const speed=m.boss?300:235;
  const dmg=Math.max(1,(m.atk||5)*(m.boss?.68:.42));
  projectiles.push({x:m.x+Math.cos(a)*18,y:m.y+Math.sin(a)*18,angle:a,speed,damage:dmg,life:m.boss?2.05:1.65,kind,radius:0,hostile:true,sourceId:m.id,free:true,trail:0});
  effects.push({type:'spark',x:m.x,y:m.y-8,life:.16,r:m.boss?16:10});
}
function chooseMonsterShape(shape=null,boss=false){
  if(boss)return 10;
  if(shape!==null&&shape!==undefined){const n=Number(shape);return clamp(Number.isFinite(n)?n:0,0,9);}
  const used=new Set(monsters.filter(m=>!m.dead&&!m.boss).map(m=>m.shape));
  const free=[];
  for(let i=0;i<10;i++)if(!used.has(i))free.push(i);
  return free.length?free[irnd(0,free.length-1)]:irnd(0,9);
}

function dungeonFindGridPointNear(x,y,cell,rad){

function dungeonAutoPathPoint(actor,tx,ty,rad=18){

function dungeonSpawnPoint(boss=false,shape=0){

function dungeonUniqueSorted(vals){
  const out=[];
  vals.filter(v=>Number.isFinite(v)).sort((a,b)=>a-b).forEach(v=>{
    if(!out.length||Math.abs(v-out[out.length-1])>.01)out.push(v);

}
function computeDungeonBoundarySegments(rects){

  if(!rects.length)return [];
  const xs=dungeonUniqueSorted(rects.flatMap(r=>[r.x,r.x+r.w]));
  const ys=dungeonUniqueSorted(rects.flatMap(r=>[r.y,r.y+r.h]));

    const cy=(ys[j]+ys[j+1])/2;

      covered[j][i]=rects.some(r=>cx>r.x-.01&&cx<r.x+r.w+.01&&cy>r.y-.01&&cy<r.y+r.h+.01);
    }

      if(!isCov(i,j+1))raw.push({d:'h',y:ys[j+1],a:xs[i],b:xs[i+1]});
      if(!isCov(i-1,j))raw.push({d:'v',x:xs[i],a:ys[j],b:ys[j+1]});

}
function segmentVisibleWorld(s,pad=140){

  if(s.d==='h')return s.x2>camera.x-pad&&s.x1<camera.x+W+pad&&s.y>camera.y-pad&&s.y<camera.y+H+pad;
  return s.x>camera.x-pad&&s.x<camera.x+W+pad&&s.y2>camera.y-pad&&s.y1<camera.y+H+pad;
}
function segmentVisibleMini(s,tr){
  if(!s||!tr)return false;
  if(s.d==='h'){
    const x1=tr.x(s.x1), x2=tr.x(s.x2), y=tr.y(s.y);
    return x2>=tr.pad&&x1<=tr.pad+tr.iw&&y>=tr.pad&&y<=tr.pad+tr.ih;
  }
  const x=tr.x(s.x), y1=tr.y(s.y1), y2=tr.y(s.y2);
  return x>=tr.pad&&x<=tr.pad+tr.iw&&y2>=tr.pad&&y1<=tr.pad+tr.ih;
}
function drawDungeonBoundarySegments(target,segments,alpha,width,tx,ty,visibleFn,glow=true){
  if(!segments||!segments.length)return;
  target.save();
  target.strokeStyle=`rgba(0,255,114,${alpha})`;
  target.lineWidth=width;
  target.lineCap='round';
  target.lineJoin='round';
  target.miterLimit=1;
  if(glow){target.shadowColor='rgba(0,255,114,.72)';target.shadowBlur=8;}else{target.shadowBlur=0;}
  target.beginPath();
  let has=false;
  for(const s of segments){
    if(visibleFn&&!visibleFn(s))continue;
    if(s.d==='h'){
      target.moveTo(tx(s.x1),ty(s.y)); target.lineTo(tx(s.x2),ty(s.y));
    }else{
      target.moveTo(tx(s.x),ty(s.y1)); target.lineTo(tx(s.x),ty(s.y2));
    }
    has=true;
  }
  if(has)target.stroke();
  target.restore();
}

function wallBlockedIntervals(rects,r,side){
  const base=(side==='top'||side==='bottom')?[r.x,r.x+r.w]:[r.y,r.y+r.h];
  const raw=[];
  const sidePos=(side==='top')?r.y:(side==='bottom'?r.y+r.h:(side==='left'?r.x:r.x+r.w));
  for(const o of rects){
    if(!o||o===r)continue;
    if(side==='top'||side==='bottom'){
      const crosses=o.y<=sidePos+.01 && o.y+o.h>=sidePos-.01;
      if(!crosses)continue;
      const a=Math.max(base[0],o.x), b=Math.min(base[1],o.x+o.w);
      if(b-a>1.5)raw.push([a,b]);
    }else{
      const crosses=o.x<=sidePos+.01 && o.x+o.w>=sidePos-.01;
      if(!crosses)continue;
      const a=Math.max(base[0],o.y), b=Math.min(base[1],o.y+o.h);
      if(b-a>1.5)raw.push([a,b]);
    }
  }
  raw.sort((a,b)=>a[0]-b[0]);
  const merged=[];
  for(const iv of raw){
    const a=dungeonClamp(iv[0],base[0],base[1]), b=dungeonClamp(iv[1],base[0],base[1]);
    if(b-a<=1.5)continue;
    const last=merged[merged.length-1];
    if(last&&a<=last[1]+.75)last[1]=Math.max(last[1],b);
    else merged.push([a,b]);
  }
  return merged;
}
function wallOpenIntervals(start,end,blocked){
  const out=[]; let cur=start;
  for(const [a,b] of blocked){
    if(a-cur>2)out.push([cur,a]);
    cur=Math.max(cur,b);
  }
  if(end-cur>2)out.push([cur,end]);
  return out;
}
function applyWallLineStyle(target,alpha,width,glow=true){
  target.strokeStyle=`rgba(0,255,114,${alpha})`;
  target.lineWidth=width;
  target.lineCap='butt';
  target.lineJoin='miter';
  if(glow){target.shadowColor='rgba(0,255,114,.72)';target.shadowBlur=8;}else{target.shadowBlur=0;}
}
function drawExternalRectWalls(target,rects,r,alpha,width,tx,ty,visibleFn,glow=true){
  if(visibleFn&&!visibleFn(r))return;
  applyWallLineStyle(target,alpha,width,glow);
  target.beginPath();
  let has=false;
  const sides=[
    ['top',r.x,r.x+r.w,r.y],['bottom',r.x,r.x+r.w,r.y+r.h],
    ['left',r.y,r.y+r.h,r.x],['right',r.y,r.y+r.h,r.x+r.w]
  ];
  for(const side of sides){
    const name=side[0], a0=side[1], a1=side[2], fixed=side[3];
    const open=wallOpenIntervals(a0,a1,wallBlockedIntervals(rects,r,name));
    for(const [a,b] of open){
      if(name==='top'||name==='bottom'){
        target.moveTo(tx(a),ty(fixed)); target.lineTo(tx(b),ty(fixed));
      }else{
        target.moveTo(tx(fixed),ty(a)); target.lineTo(tx(fixed),ty(b));
      }
      has=true;
    }
  }
  if(has)target.stroke();
}

function miniMapTransform(pad,iw,ih){
  const full={
    pad,iw,ih,left:0,top:0,viewW:fieldSize,viewH:fieldSize,
    sx:iw/fieldSize,sy:ih/fieldSize,
    x(v){return pad+v*this.sx;},
    y(v){return pad+v*this.sy;}
  };
  if(!dungeonActive())return full;
  const rects=[...(dungeonMap.rooms||[]),...(dungeonMap.corridors||[])];
  if(!rects.length)return full;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const r of rects){
    minX=Math.min(minX,r.x); minY=Math.min(minY,r.y);
    maxX=Math.max(maxX,r.x+r.w); maxY=Math.max(maxY,r.y+r.h);
  }
  const gap=150;
  minX=clamp(minX-gap,0,fieldSize); minY=clamp(minY-gap,0,fieldSize);
  maxX=clamp(maxX+gap,0,fieldSize); maxY=clamp(maxY+gap,0,fieldSize);
  const boundsW=Math.max(1,maxX-minX), boundsH=Math.max(1,maxY-minY);
  const base=dungeonClamp(fieldSize*.38,980,1360);
  let viewW=Math.min(boundsW,base), viewH=viewW*(ih/iw);
  if(viewH>Math.min(boundsH,base)){viewH=Math.min(boundsH,base);viewW=viewH*(iw/ih);}
  viewW=Math.max(1,Math.min(viewW,boundsW)); viewH=Math.max(1,Math.min(viewH,boundsH));
  const left=dungeonClamp(player.x-viewW/2,minX,Math.max(minX,maxX-viewW));
  const top=dungeonClamp(player.y-viewH/2,minY,Math.max(minY,maxY-viewH));
  return {
    pad,iw,ih,left,top,viewW,viewH,
    sx:iw/viewW,sy:ih/viewH,
    x(v){return pad+(v-left)*this.sx;},
    y(v){return pad+(v-top)*this.sy;}
  };
}

function jobPreferredWeaponType(jobId){
  const j=jobById(jobId||(typeof player!=='undefined'&&player.job)||'blade');
  const base=j.attackBase||j.weaponBase||j.skillBase||j.id;
  if(['ranger','sniper'].includes(base)||['ranger','sniper'].includes(j.id)) return ITEM_TYPES.find(t=>t.slot==='weapon'&&t.name==='활')||ITEM_TYPES[0];
  if(['mage','hexer','summoner','psion','druid','chronomancer','necromancer'].includes(base)||['mage','hexer','summoner','psion','druid','chronomancer','necromancer'].includes(j.id)) return ITEM_TYPES.find(t=>t.slot==='weapon'&&t.name==='지팡이')||ITEM_TYPES[0];
  if(['mechanic','gunner','engineer'].includes(base)||['mechanic','gunner','engineer'].includes(j.id)) return ITEM_TYPES.find(t=>t.slot==='weapon'&&t.name==='기어블레이드')||ITEM_TYPES[0];
  return ITEM_TYPES.find(t=>t.slot==='weapon'&&t.name==='검')||ITEM_TYPES[0];
}
function pickItemTypeForJob(slot=null,jobId=null){

  const j=jobById(jobId||(typeof player!=='undefined'&&player.job)||'blade');
  if(Math.random()<.36) return jobPreferredWeaponType(j.id);

}
function itemValue(it){

  const statSum=Object.values(it.stats||{}).reduce((s,v)=>s+(Number(v)||0),0);

function itemScore(it){
  if(!it)return -1;
  const job=jobById(player.job||'blade');
  const base=job.attackBase||job.weaponBase||job.skillBase||job.id;
  const weights={atk:3,hp:.28,def:2.2,speed:1.1,aspd:28,crit:38,critDmg:25,lifesteal:34,hpRegen:5,skillPower:32,range:1.2,dodge:26,reflect:20,expBonus:8,goldBonus:8,summonPower:30,cooldown:34,mpRegen:10,magnet:.85,all:18};
  if(['ranger','sniper','gunner'].includes(base)){weights.range=2.2;weights.crit=48;weights.aspd=34;}
  if(['mage','hexer','psion','chronomancer','alchemist'].includes(base)){weights.skillPower=48;weights.cooldown=42;weights.range=1.6;}
  if(['summoner','druid','mechanic','engineer'].includes(base)){weights.summonPower=48;weights.cooldown=34;}
  if(['mirror'].includes(base)||job.id==='mirror'){weights.reflect=62;weights.hp=0.45;weights.def=3;}
  if(['blade','assassin','monk','berserker'].includes(base)||['blade','assassin','monk','berserker'].includes(job.id)){weights.atk=3.7;weights.lifesteal=42;weights.aspd=35;}
  let score=(it.level||1)*8 + (RARITIES.find(r=>r.name===it.rarity)?.mult||1)*30;
  for(const [k,v] of Object.entries(it.stats||{})) score+=(weights[k]||1)*(Number(v)||0);
  if(it.slot==='weapon' && jobPreferredWeaponType(job.id).name && it.name.includes(jobPreferredWeaponType(job.id).name)) score+=18;
  return score;
}
function makeItem(level=1,rarityName=null,slot=null,jobId=null){
  const rarity = rarityName ? RARITIES.find(r=>r.name===rarityName) : chooseWeighted(RARITIES);
  const type = pickItemTypeForJob(slot, jobId||(typeof player!=='undefined'&&player.job)||'blade');
  const prefix = ['네온','광선','초록','선형','공명','심연','기어','룬','파동','격자'][irnd(0,9)];
  const item={id:cryptoId(),name:`${prefix} ${type.name}`,slot:type.slot,level,rarity:rarity.name,stats:{},equipped:false};
  const statCount = rarity.name==='일반'?2:(rarity.name==='레어'?2:(rarity.name==='희귀'?3:(rarity.name==='에픽'?3:(rarity.name==='전설'?4:5))));
  const pool=[...type.stats];
  for(let i=0;i<statCount;i++){
    if(pool.length===0)pool.push(...type.stats);
    const st=pool.splice(irnd(0,pool.length-1),1)[0]||type.stats[0];
    const base=(level+2)*rarity.mult;
    let val=1;
    if(st==='atk') val=fmt(base*rnd(.7,1.22));
    else if(st==='hp') val=Math.max(5,Math.round(base*rnd(6,12)));
    else if(st==='def') val=Math.max(.5,fmt(base*rnd(.32,.82)));
    else if(st==='speed') val=Math.max(2,fmt(rnd(4,10)*rarity.mult));
    else if(st==='aspd') val=Math.max(.02,fmtSmall(rnd(.025,.075)*rarity.mult));
    else if(st==='crit'||st==='lifesteal'||st==='dodge'||st==='reflect'||st==='expBonus'||st==='goldBonus'||st==='cooldown') val=Math.max(.01,fmtSmall(rnd(.02,.06)*rarity.mult));
    else if(st==='critDmg') val=Math.max(.05,fmtSmall(rnd(.08,.22)*rarity.mult));
    else if(st==='hpRegen') val=Math.max(.2,fmt(rnd(.5,1.6)*rarity.mult));
    else if(st==='skillPower'||st==='summonPower'||st==='mpRegen') val=Math.max(.04,fmtSmall(rnd(.08,.24)*rarity.mult));
    else if(st==='range') val=Math.max(6,fmt(rnd(10,28)*rarity.mult));
    else if(st==='magnet') val=Math.max(8,fmt(rnd(12,38)*rarity.mult));
    else if(st==='all') val=Math.max(.5,fmt(rnd(1.0,2.8)*rarity.mult));
    item.stats[st]=(item.stats[st]||0)+val;
  }
  if(type.slot==='weapon'){
    const j=jobById(jobId||(typeof player!=='undefined'&&player.job)||'blade');
    if(j.weaponName && Math.random()<.55)item.name=j.weaponName;
  }
  return item;
}

function autoEquipBest(){
  let changed=0;
  for(const slot of Object.keys(player.equip)){
    const candidates=player.inventory.filter(it=>it.slot===slot);
    if(!candidates.length)continue;
    const best=candidates.slice().sort((a,b)=>itemScore(b)-itemScore(a))[0];
    if(best && itemScore(best)>itemScore(player.equip[slot])){equipItem(best.id,true);changed++;}
  }
  syncHp(); toast(changed?`자동장착 ${changed}부위 교체`:'교체할 장비 없음'); renderBag();
}

function doDamage(target,base,kind='hit',canCrit=true){
  if(!target || target.dead)return 0;
  const st=computeStats(); let dmg=Math.max(1,base-(target.def||0)*0.45);
  let crit=false; if(canCrit && Math.random()<st.crit){crit=true;dmg*=1.5+st.critDmg;}
  if(target.weak)dmg*=1.25;
  dmg=Math.round(dmg*rnd(.88,1.12));
  target.hp-=dmg; target.hit=.18;
  effects.push({type:'text',x:target.x,y:target.y-22,t:crit?`CRIT ${dmg}`:`${dmg}`,life:.75,vy:-28,big:crit});
  effects.push({type:'spark',x:target.x,y:target.y,life:.25,r:8+Math.random()*8});
  // 흡혈 수정: 실제 피해량 기준으로 즉시 회복한다. 장비/성장/직업 흡혈이 모두 여기로 들어온다.
  if(st.lifesteal>0 && dmg>0){
    const heal=Math.max(1,Math.floor(dmg*st.lifesteal));
    if(player.hp<player.maxHp){player.hp=clamp(player.hp+heal,0,player.maxHp);}
  }
  if(target.hp<=0) killMonster(target);
  return dmg;
}

function usePotion(key=null,silent=false){

  }

function playerHit(dmg,source){

  if(source && st.reflect>0){const rd=Math.max(1,Math.round(final*st.reflect));doDamage(source,rd,'reflect',false);effects.push({type:'text',x:source.x,y:source.y-40,t:`반사 ${rd}`,life:.7,vy:-22});}
  if(player.hp<=0){player.hp=player.maxHp;player.gold=Math.max(0,player.gold-50);enterField('town');toast('쓰러졌습니다. 마을로 복귀');}

function makeGrowthOptions(){
  const rarityPool=RARITIES.map(r=>({name:r.name,weight:r.weight}));

  const stats=(job.growthStats&&job.growthStats.length?job.growthStats:['atk','hp','def','speed','aspd','crit']).filter(s=>s==='reflect'?job.id==='mirror':true);
  const out=[]; const used=new Set(); let guard=0;
  while(out.length<3 && guard++<80){
    const stat=stats[irnd(0,stats.length-1)]; if(!stat||used.has(stat))continue; used.add(stat);
    const rarity=chooseWeighted(rarityPool).name; const mult=RARITIES.find(r=>r.name===rarity).mult; let value=1;
    if(stat==='atk') value=fmt((2.4+player.level*.72)*mult); else if(stat==='hp') value=Math.round((22+player.level*5.2)*mult); else if(stat==='def') value=fmt((1.3+player.level*.32)*mult); else if(stat==='speed') value=fmt((4.2+player.level*.14)*mult); else if(stat==='aspd') value=fmtSmall((.04+player.level*.00135)*mult); else if(stat==='crit') value=fmtSmall((.038+player.level*.001)*mult); else if(stat==='critDmg') value=fmtSmall((.12+player.level*.0024)*mult); else if(stat==='lifesteal') value=fmtSmall((.022+player.level*.00055)*mult); else if(stat==='hpRegen') value=fmt((.75+player.level*.09)*mult); else if(stat==='skillPower'||stat==='summonPower') value=fmtSmall((.085+player.level*.0018)*mult); else if(stat==='range') value=fmt((10+player.level*.42)*mult); else if(stat==='dodge') value=fmtSmall((.026+player.level*.00065)*mult); else if(stat==='reflect') value=fmtSmall((.055+player.level*.0011)*mult); else if(stat==='expBonus'||stat==='goldBonus') value=fmtSmall((.045+player.level*.0009)*mult); else if(stat==='cooldown') value=fmtSmall((.022+player.level*.00055)*mult); else if(stat==='mpRegen') value=fmtSmall((.08+player.level*.001)*mult);
    out.push({id:cryptoId(),stat,value,rarity,name:`${rarity} ${STAT_LABEL[stat]} 성장`});
  }
  while(out.length<3){const stat=['atk','hp','def'][out.length];out.push({id:cryptoId(),stat,value:stat==='hp'?30:3,rarity:'일반',name:`일반 ${STAT_LABEL[stat]} 성장`});}
  return out;
}

function spinRoulette(){
  if(popupMode!=='roulette'||rouletteSpinning)return;
  const wheel=$('wheel'), result=$('rouletteResult'), spinBtn=$('spinBtn'), okBtn=$('rouletteOk');
  if(!wheel||!result)return;
  rouletteSpinning=true;
  if(spinBtn)spinBtn.disabled=true;
  result.textContent='회전 중...';
  const segs=[
    {outcome:'fail',label:'꽝'},
    {outcome:'one',label:'1개 선택'},
    {outcome:'two',label:'2개 선택'},
    {outcome:'fail',label:'꽝'},
    {outcome:'one',label:'1개 선택'},
    {outcome:'three',label:'3개 선택'},
    {outcome:'fail',label:'꽝'},
    {outcome:'two',label:'2개 선택'},
    {outcome:'one',label:'1개 선택'},
    {outcome:'fail',label:'꽝'},
    {outcome:'two',label:'2개 선택'},
    {outcome:'one',label:'1개 선택'}
  ];
  const idx=irnd(0,segs.length-1), picked=segs[idx];
  const duration=rnd(3,7), spins=irnd(5,9);
  wheel.dataset.outcome=picked.outcome;
  wheel.dataset.roll=String(idx+1);
  wheel.dataset.label=picked.label;
  wheel.style.transition=`transform ${duration.toFixed(2)}s cubic-bezier(.12,.78,.16,1)`;
  wheel.style.transform=`rotate(${spins*360-(idx*30+15)}deg)`;
  setTimeout(()=>{
    rouletteSpinning=false;
    result.textContent=`상단 눈금 결과 ${idx+1}번 구역 : ${picked.label}`;
    if(okBtn)okBtn.classList.remove('hidden');
  },duration*1000+60);
}
function confirmRouletteResult(){const outcome=$('wheel').dataset.outcome; if(outcome==='fail'){closePopup(); growthSelected=[]; growthSelectNeed=0; syncHp(); if(pendingLevelUps>0)setTimeout(openGrowth,100); else toast('룰렛 실패: 선택 없이 통과'); return;} growthSelectNeed=outcome==='three'?3:(outcome==='two'?2:1); growthSelected=[]; popupMode='growth'; renderGrowth();}

function jobUnlockStatus(job){
  const u=job.unlock||{};const fail=[];
  if(u.level&&player.level<u.level)fail.push(`레벨 ${u.level}`);
  if(u.totalKills&&player.totalKills<u.totalKills)fail.push(`누적 처치 ${u.totalKills}`);
  if(u.bossKills&&bossKillsTotal()<u.bossKills)fail.push(`보스 처치 ${u.bossKills}`);
  if(u.gold&&player.gold<u.gold)fail.push(`보유 골드 ${u.gold}G`);
  if(u.guildTokens&&player.guildTokens<u.guildTokens)fail.push(`길드 토큰 ${u.guildTokens}`);
  if(Array.isArray(u.requireJobs)&&u.requireJobs.length){const hist=Array.isArray(player.jobHistory)?player.jobHistory:[];const ok=u.requireJobs.includes(player.job)||u.requireJobs.some(id=>hist.includes(id));if(!ok)fail.push('필요 직업 흔적');}
  return {ok:fail.length===0,fail,hint:u.hint||''};
}
function advancementStageInfo(){const cur=jobById(player.job||'adventurer');if(cur.id==='adventurer')return {title:'1차 직업 선택',need:0,next:player.firstJobUnlocked?JOBS.filter(j=>j.tier===1&&!j.hidden):[]};if(!player.job)return {title:'1차 직업 선택',need:0,next:JOBS.filter(j=>j.tier===1&&!j.hidden)};if(cur.tier===1)return {title:'2차 전직',need:20,next:(cur.nextJobs||[]).map(jobById)};if(cur.tier===2)return {title:'3차 전직',need:50,next:(cur.nextJobs||[]).map(jobById)};return {title:'전직 완료',need:null,next:[]};}
function hiddenJobCards(){return JOBS.filter(j=>j.hidden).map(j=>{const st=jobUnlockStatus(j);const title=st.ok?j.name:'???';const disabled=st.ok?'':'disabled';const detail=st.ok?`${j.desc}<br><span class="small">${jobBadge(j)}<br>${jobPartyLine(j)}</span>`:`히든 전직 조건 미달<br><span class="small">힌트: ${escapeHtml(st.hint||'특수 조건 필요')}<br>부족: ${st.fail.join(' / ')||'조건 확인 필요'}</span>`;return `<button class="card ${st.ok?'':'locked'}" ${disabled} onclick="Game.advanceJob('${j.id}')"><h3>${title}</h3><b>${st.ok?'히든 전직 발견':'히든 전직'}</b><br>${detail}</button>`;}).join('');}

function advanceJob(id){
  normalizePlayer();const next=jobById(id), cur=jobById(player.job||'warrior');
  if(!next||!next.id){toast('전직 정보 오류');return;}
  const info=advancementStageInfo();
  if(next.hidden){const st=jobUnlockStatus(next);if(!st.ok){toast('히든 전직 조건 부족');showAdvancement();return;}}
  else{const allowed=(info.next||[]).some(j=>j&&j.id===next.id);if(!allowed){toast('현재 단계에서 선택할 수 없는 전직');showAdvancement();return;}if(info.need&&player.level<info.need){toast(`Lv.${info.need}부터 전직 가능`);showAdvancement();return;}}
  const prevId=player.job||null;
  player.job=next.id;player.baseClass=next.baseClass||cur.baseClass||player.baseClass;player.jobTier=next.tier||3;player.jobHistory=Array.isArray(player.jobHistory)?player.jobHistory:[];if(prevId&&!player.jobHistory.includes(prevId))player.jobHistory.push(prevId);if(!player.jobHistory.includes(next.id))player.jobHistory.push(next.id);
  player.skillStars=player.skillStars||{};if(prevId&&!player.skillStars[next.id])player.skillStars[next.id]=Math.max(player.skillStars[prevId]||0,player.skillStars[next.skillBase]||0,0);
  const w=makeItem(Math.max(1,player.level||1),next.hidden?'희귀':'일반','weapon',next.id);w.name=next.weaponName||`초록 ${next.name} 무기`;player.inventory.push(w);equipItem(w.id,true);
  syncHp();saveGame();toast(`${next.name} 전직 완료`);msg(`${cur.name} → ${next.name} 전직 완료. ${jobBadge(next)}`);updateHud();showAdvancement();
}

function spriteParallaxX(layout, drift){

function baseSpriteLine(alpha=1,w=1.4){

function drawPerspectiveFloor(theme){
  const horizon=H*.38;
  const vpX=W*.5;
  lineStyle(.14,1);
  for(let i=0;i<14;i++){
    const p=i/13;
    const y=horizon+(H-horizon)*(p*p);
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(W,y);
    ctx.stroke();
  }
  lineStyle(.11,1);
  for(let x=-W;x<W*2;x+=110){
    ctx.beginPath();
    ctx.moveTo(vpX,horizon);
    ctx.lineTo(x,H);
    ctx.stroke();
  }
  lineStyle(.08,1);
  if(theme==='철로'){
    ctx.beginPath();
    ctx.moveTo(vpX-28,horizon); ctx.lineTo(W*.28,H);
    ctx.moveTo(vpX+28,horizon); ctx.lineTo(W*.72,H);
    ctx.stroke();
  }else if(theme==='심연'){
    for(let r=90;r<W;r+=130){
      ctx.beginPath();
      ctx.arc(vpX,horizon+110,r,0,Math.PI*2);
      ctx.stroke();
    }
  }else if(theme==='미궁'||theme==='폐허'){
    for(let x=24;x<W;x+=126){
      ctx.strokeRect(x,H*.74,44,24);
    }
  }
}
function drawPerspectiveBackdrop(f){
  const theme=(f&&f.theme)||'필드';
  ctx.save();
  const drift=Math.sin((camera.x+camera.y)*.0008)*12;
  lineStyle(.10,1);
  ctx.beginPath();
  ctx.moveTo(0,H*.38);
  ctx.lineTo(W,H*.38);
  ctx.stroke();

  for(const layout of BG_SPRITE_LAYOUT){
    const x=spriteParallaxX(layout, drift*(.4+layout.depth));
    const y=H*layout.py;
    drawThemeSprite(theme, layout.slot, x, y, layout.sc);
  }

  ctx.restore();
}
function drawBackground(){
  const f=FIELDS.find(x=>x.id===currentField)||FIELDS[0];
  ctx.save();
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  // 5개 스프라이트 기반 2.5D 배경
  drawPerspectiveBackdrop(f);

  ctx.restore();
}
function drawFieldGround(){
  if(currentField==='town')return;
  if(dungeonActive()){drawDungeonMap();return;}
  const f=FIELDS.find(x=>x.id===currentField)||FIELDS[1];
  const theme=f.theme||'필드';
  const left=Math.max(0,camera.x-180),right=Math.min(fieldSize,camera.x+W+180),top=Math.max(0,camera.y-180),bottom=Math.min(fieldSize,camera.y+H+180);
  const t=performance.now()/1000, cx=fieldSize/2, cy=fieldSize/2;

  function isoDiamond(x,y,w,h){
    ctx.beginPath();
    ctx.moveTo(x,y-h);
    ctx.lineTo(x+w,y);
    ctx.lineTo(x,y+h);
    ctx.lineTo(x-w,y);
    ctx.closePath();
  }
  function drawIsoGrid(step=140, major=420){
    // 작은 다이아몬드 망
    lineStyle(.12,1);
    for(let s=Math.floor((left+top)/step)*step; s<=right+bottom; s+=step){
      ctx.beginPath();
      ctx.moveTo(left,s-left);
      ctx.lineTo(right,s-right);
      ctx.stroke();
    }
    for(let d=Math.floor((left-bottom)/step)*step; d<=right-top; d+=step){
      ctx.beginPath();
      ctx.moveTo(left,left-d);
      ctx.lineTo(right,right-d);
      ctx.stroke();
    }
    // 큰 다이아몬드 망
    lineStyle(.24,1.4);
    for(let s=Math.floor((left+top)/major)*major; s<=right+bottom; s+=major){
      ctx.beginPath();
      ctx.moveTo(left,s-left);
      ctx.lineTo(right,s-right);
      ctx.stroke();
    }
    for(let d=Math.floor((left-bottom)/major)*major; d<=right-top; d+=major){
      ctx.beginPath();
      ctx.moveTo(left,left-d);
      ctx.lineTo(right,right-d);
      ctx.stroke();
    }
  }

  ctx.save();

  // 2.5D 바닥 기준선
  drawIsoGrid(120, 420);

  lineStyle(.30,1.25);

  if(theme==='폐허'){
    for(let i=0;i<18;i++){
      const x=(i*283)%fieldSize, y=(i*191+120)%fieldSize;
      if(x<left-160||x>right+160||y<top-160||y>bottom+160) continue;
      isoDiamond(x,y,62,30); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x-26,y-10); ctx.lineTo(x+12,y+18);
      ctx.moveTo(x+10,y-8); ctx.lineTo(x+34,y+8);
      ctx.stroke();
    }
  }else if(theme==='미궁'){
    for(let x=Math.floor(left/280)*280; x<=right; x+=280){
      for(let y=Math.floor(top/280)*280; y<=bottom; y+=280){
        isoDiamond(x+80,y+80,76,40); ctx.stroke();
        isoDiamond(x+80,y+80,38,20); ctx.stroke();
      }
    }
  }else if(theme==='동굴'){
    for(let i=0;i<26;i++){
      const x=(i*227+80)%fieldSize, y=(i*317+50)%fieldSize;
      if(x<left-120||x>right+120||y<top-120||y>bottom+120) continue;
      ctx.beginPath();
      ctx.arc(x,y,26+Math.sin(t+i)*2,0,Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x-18,y+8); ctx.lineTo(x,y-26); ctx.lineTo(x+18,y+10);
      ctx.stroke();
    }
  }else if(theme==='기계'){
    for(let x=Math.floor(left/240)*240; x<=right; x+=240){
      for(let y=Math.floor(top/240)*240; y<=bottom; y+=240){
        isoDiamond(x+88,y+88,58,28); ctx.stroke();
        ctx.beginPath();
        ctx.arc(x+88,y+88,18,0,Math.PI*2); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x+88,y+48); ctx.lineTo(x+88,y+128);
        ctx.moveTo(x+48,y+88); ctx.lineTo(x+128,y+88);
        ctx.stroke();
      }
    }
  }else if(theme==='심연'){
    for(let r=180;r<fieldSize*.75;r+=240){
      ctx.beginPath();
      ctx.ellipse(cx,cy,r,r*.52,0,0,Math.PI*2);
      ctx.stroke();
    }
    for(let i=0;i<10;i++){
      const a=i*Math.PI*2/10+t*.05;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(a)*fieldSize*.55,cy+Math.sin(a)*fieldSize*.30);
      ctx.stroke();
    }
  }else if(theme==='숲'){
    for(let i=0;i<30;i++){
      const x=(i*173+90)%fieldSize, y=(i*251+160)%fieldSize;
      if(x<left-100||x>right+100||y<top-100||y>bottom+100) continue;
      isoDiamond(x,y,34,18); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x,y-44); ctx.lineTo(x,y+8);
      ctx.moveTo(x-18,y-18); ctx.lineTo(x,y-34); ctx.lineTo(x+18,y-18);
      ctx.stroke();
    }
  }else if(theme==='철로'){
    for(let y=Math.floor(top/280)*280; y<=bottom; y+=280){
      ctx.beginPath();
      ctx.moveTo(left,y); ctx.lineTo(right,y+90);
      ctx.moveTo(left,y+42); ctx.lineTo(right,y+132);
      ctx.stroke();
      for(let x=Math.floor(left/90)*90; x<=right; x+=90){
        ctx.beginPath();
        ctx.moveTo(x,y+8); ctx.lineTo(x+18,y+60);
        ctx.stroke();
      }
    }
  }else if(theme==='탑'){
    for(let r=120;r<fieldSize*.65;r+=180){
      ctx.beginPath();
      ctx.ellipse(cx,cy,r,r*.56,0,0,Math.PI*2);
      ctx.stroke();
    }
    for(let i=0;i<12;i++){
      const a=i*Math.PI*2/12;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(a)*fieldSize*.42,cy+Math.sin(a)*fieldSize*.24);
      ctx.stroke();
    }
  }else if(theme==='항구'){
    for(let y=Math.floor(top/220)*220; y<=bottom; y+=220){
      ctx.beginPath();
      ctx.moveTo(left,y+Math.sin(t+y)*8);

      ctx.stroke();
    }
    for(let x=Math.floor(left/340)*340; x<=right; x+=340){
      isoDiamond(x+70,cy-40,78,22); ctx.stroke();
    }
  }else if(theme==='실험'){
    for(let x=Math.floor(left/260)*260; x<=right; x+=260){
      for(let y=Math.floor(top/260)*260; y<=bottom; y+=260){

        ctx.arc(x+80,y+80,24,0,Math.PI*2); ctx.stroke();

        ctx.moveTo(x+80,y+44); ctx.lineTo(x+80,y+116);
        ctx.moveTo(x+44,y+80); ctx.lineTo(x+116,y+80);
        ctx.stroke();
      }
    }
  }else if(theme==='균열'){
    for(let i=0;i<16;i++){
      const a=i*Math.PI*2/16+t*.07;

      ctx.moveTo(cx+Math.cos(a)*120,cy+Math.sin(a)*70);
      ctx.lineTo(cx+Math.cos(a)*fieldSize*.52,cy+Math.sin(a)*fieldSize*.36);
      ctx.stroke();
    }
    for(let r=150;r<fieldSize*.62;r+=210){
      ctx.beginPath();
      ctx.ellipse(cx,cy,r,r*.43,Math.sin(t+r)*.08,0,Math.PI*2);
      ctx.stroke();
    }
  }else{
    for(let x=Math.floor(left/260)*260; x<=right; x+=260){
      for(let y=Math.floor(top/260)*260; y<=bottom; y+=260){
        isoDiamond(x+80,y+80,80,34); ctx.stroke();
        isoDiamond(x+80,y+80,38,18); ctx.stroke();
      }
    }
  }

  drawDungeonMap();
  ctx.restore();

function angleLerp(a,b,t){
  if(!Number.isFinite(a))return b;
  if(!Number.isFinite(b))return a;
  const d=Math.atan2(Math.sin(b-a),Math.cos(b-a));
  return a+d*clamp(t,0,1);
}

function fullMapBounds(){

function bind(){
  const joy=$('joy'), stick=$('stick');
  const setJoy=(clientX,clientY)=>{const r=joy.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=clientX-cx,dy=clientY-cy;const len=Math.hypot(dx,dy),max=r.width/2-22;if(len>max){dx=dx/len*max;dy=dy/len*max;}joystick.dx=dx/max;joystick.dy=dy/max;stick.style.transform=`translate(${dx}px,${dy}px)`;};
  joy.addEventListener('pointerdown',e=>{e.preventDefault();joystick.active=true;joystick.id=e.pointerId;joy.setPointerCapture(e.pointerId);setJoy(e.clientX,e.clientY);},{passive:false});
  joy.addEventListener('pointermove',e=>{if(joystick.active&&e.pointerId===joystick.id){e.preventDefault();setJoy(e.clientX,e.clientY);}},{passive:false});
  const end=e=>{if(e.pointerId===joystick.id){joystick.active=false;joystick.id=null;joystick.dx=joystick.dy=0;stick.style.transform='translate(0,0)';}};joy.addEventListener('pointerup',end);joy.addEventListener('pointercancel',end);
  const hold=(el,down,up)=>{el.addEventListener('pointerdown',e=>{e.preventDefault();down();});el.addEventListener('pointerup',e=>{e.preventDefault();up();});el.addEventListener('pointercancel',up);el.addEventListener('pointerleave',up);};

  const dodgeBtn=$('dodgeBtn');
  dodgeBtn.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();dodge();},{passive:false});
  dodgeBtn.onclick=e=>{e.preventDefault();};

  mini.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();showFullMap();},{passive:false});
  $('autoBtn').addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();quickToggleAuto();},{passive:false});
  document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false}); document.addEventListener('contextmenu',e=>e.preventDefault()); document.addEventListener('selectstart',e=>e.preventDefault());
}

  player.firstJobUnlocked=true;
  const job=jobById(id);
  player.job=id;

  player.jobTier=job.tier||1;

  mode='town';
  enterField('town');
  giveStarterItems();
  closePopup();
  msg(`${jobById(id).name} 시작`);
  saveGame();
  setTimeout(showPatchNotes,80);
}
