  .codexHeader{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;padding:8px 9px;margin:-2px 0 8px;border-radius:10px;}

  /* 세로/가로 화면 최적화 패치 */
  :root{
    --safe-top:env(safe-area-inset-top,0px);--safe-right:env(safe-area-inset-right,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);

  .row{gap:4px;min-width:0;}

  .bar{height:5px;}
  .topBtns{display:grid;grid-template-columns:var(--mini-size) calc(var(--menu-btn-w) * 2 + var(--menu-gap));gap:var(--hud-gap);align-items:stretch;height:var(--mini-size);pointer-events:auto;}

  .currencyPanel b{font-weight:900;text-shadow:0 0 7px rgba(var(--obj-rgb),.55);}
  .autoOn{box-shadow:0 0 16px rgba(var(--obj-rgb),.32), inset 0 0 16px rgba(var(--obj-rgb),.16)!important;background:rgba(var(--obj-rgb),.12)!important;}
  .rouletteOdds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 10px;}
  .rouletteOdds .card{text-align:center;padding:8px 5px;}
  .townNote{font-size:10px;opacity:.75;margin-top:5px;line-height:1.3;}
  @media (orientation:portrait){:root{--action-group-h:230px;}}
  @media (orientation:landscape){:root{--action-group-h:198px;}}
  @media (orientation:landscape) and (max-height:430px){:root{--action-group-h:173px;}#actions button{font-size:9.5px;}}


  /* 안정화 패치: 요청 버튼 배치 */
  #leftQuick{
    position:absolute;
    left:calc(var(--control-side) + var(--safe-left));
    bottom:calc(var(--safe-bottom) + var(--control-bottom) + var(--joy-size) + 8px);
    width:var(--joy-size);
    z-index:6;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    pointer-events:auto;
  }
  #leftQuick button{height:36px;font-size:11px;padding:3px;border-radius:10px;line-height:1.05;}
  #actions{
    grid-template-columns:repeat(2,var(--action-w))!important;
    grid-template-rows:repeat(3,var(--action-h))!important;
    grid-template-areas:
      "skill3 skill4"
      "skill1 skill2"
      "attack dodge"!important;
    gap:var(--action-gap)!important;
  }
  #skillBtn4{grid-area:skill4;}
  #skillBtn3{grid-area:skill3;width:auto;justify-self:stretch;}
  #skillBtn1{grid-area:skill1;}
  #skillBtn2{grid-area:skill2;}
  #attackBtn{grid-area:attack;}
  #dodgeBtn{grid-area:dodge;}
  #potionBtn,#autoBtn{width:100%;}
  @media (orientation:portrait){:root{--action-group-h:calc(var(--action-h) * 3 + var(--action-gap) * 2);}}
  @media (orientation:landscape){:root{--action-group-h:calc(var(--action-h) * 3 + var(--action-gap) * 2);}#leftQuick button{height:32px;font-size:10px;}}
  @media (orientation:landscape) and (max-height:430px){#leftQuick{bottom:calc(var(--safe-bottom) + var(--control-bottom) + var(--joy-size) + 5px);gap:4px;}#leftQuick button{height:28px;font-size:9.5px;}}

  /* 물약 설정 게이지: 바탕 제거, 얇은 선만 표시 */
  .neonRange{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:30px;          /* 터치 영역은 넓게 */
    padding:13px 0;
    border:0;
    background:transparent;
    box-shadow:none;
    outline:none;
    touch-action:pan-x;
  }
  .neonRange::-webkit-slider-runnable-track{
    height:2px;
    border-radius:999px;
    background:rgba(var(--obj-rgb),.9);
    box-shadow:0 0 8px rgba(var(--obj-rgb),.45);
  }
  .neonRange::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:12px;
    height:16px;
    margin-top:-7px;
    border-radius:3px;
    border:1px solid rgba(var(--obj-rgb),.95);
    background:#000;
    box-shadow:0 0 8px rgba(var(--obj-rgb),.55);
  }
  .neonRange::-moz-range-track{
    height:2px;
    border:0;
    border-radius:999px;
    background:rgba(var(--obj-rgb),.9);
    box-shadow:0 0 8px rgba(var(--obj-rgb),.45);
  }
  .neonRange::-moz-range-thumb{
    width:12px;
    height:16px;
    border-radius:3px;
    border:1px solid rgba(var(--obj-rgb),.95);
    background:#000;
    box-shadow:0 0 8px rgba(var(--obj-rgb),.55);
  }
  .neonRangeWrap{
    position:relative;
    padding:12px 6px 2px;
  }
  .neonRangeText{
    display:flex;
    justify-content:space-between;
    font-size:10px;
    opacity:.82;
    margin-top:4px;
  }
  .rangeBubble{
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    min-width:34px;
    height:18px;
    padding:2px 6px;
    border:1px solid rgba(var(--obj-rgb),.55);
    border-radius:999px;
    background:rgba(0,0,0,.9);
    color:#00ff72;
    font-size:10px;
    line-height:12px;
    text-align:center;
    box-shadow:0 0 8px rgba(var(--obj-rgb),.25), inset 0 0 6px rgba(var(--obj-rgb),.08);
    pointer-events:none;
    white-space:nowrap;
  }
  .neonRange:active::-webkit-slider-thumb{
    transform:scale(1.08);
    box-shadow:0 0 12px rgba(var(--obj-rgb),.75);
  }
  .neonRange:active::-moz-range-thumb{
    transform:scale(1.08);
    box-shadow:0 0 12px rgba(var(--obj-rgb),.75);
  }

  /* 151: 물약 설정 게이지 직접 드래그 보정 + 설정 버튼 2열 고정 */
  .neonRangeWrap.smoothRange{
    padding:18px 4px 8px;
    touch-action:none!important;
    cursor:pointer;
  }
  .smoothRange .neonRange{
    height:42px;
    padding:19px 0;
    touch-action:none!important;
  }
  .smoothRange .neonRange::-webkit-slider-runnable-track{height:4px;}
  .smoothRange .neonRange::-moz-range-track{height:4px;}
  .smoothRange .neonRange::-webkit-slider-thumb{
    width:22px;
    height:24px;
    margin-top:-10px;
    border-radius:6px;
  }
  .smoothRange .neonRange::-moz-range-thumb{
    width:22px;
    height:24px;
    border-radius:6px;
  }
  .smoothRange.dragging .rangeBubble{
    box-shadow:0 0 14px rgba(var(--obj-rgb),.55), inset 0 0 8px rgba(var(--obj-rgb),.12);
  }
  .settingsGrid{
    display:grid!important;
    grid-template-columns:repeat(2,minmax(0,1fr))!important;
    gap:8px!important;
  }
  .settingsGrid button{min-height:44px;}


  /* 152: 물약 게이지 완전 스무스 커스텀 트랙 */
  .neonRangeWrap.smoothRange{
    --potion-pct:42%;
    position:relative!important;
    padding:22px 8px 10px!important;
    touch-action:none!important;
    cursor:pointer;
  }
  .smoothRange .neonRange{
    position:absolute!important;
    width:1px!important;
    height:1px!important;
    opacity:0!important;
    pointer-events:none!important;
    left:-9999px!important;
  }
  .smoothTrack{
    position:relative;
    height:34px;
    margin:8px 2px 7px;
    touch-action:none;
  }
  .smoothTrack::before{
    content:"";
    position:absolute;
    left:0;right:0;top:50%;
    height:3px;
    transform:translateY(-50%);
    border-radius:999px;
    background:rgba(var(--obj-rgb),.18);
    box-shadow:0 0 8px rgba(var(--obj-rgb),.20), inset 0 0 6px rgba(var(--obj-rgb),.08);
  }
  .smoothTrackFill{
    position:absolute;
    left:0;top:50%;
    width:var(--potion-pct);
    height:3px;
    transform:translateY(-50%);
    border-radius:999px;
    background:rgba(var(--obj-rgb),.95);
    box-shadow:0 0 10px rgba(var(--obj-rgb),.65);
    pointer-events:none;
    transition:none!important;
    will-change:width;
  }
  .smoothTrackThumb{
    position:absolute;
    left:var(--potion-pct);
    top:50%;
    width:22px;
    height:22px;
    transform:translate(-50%,-50%);
    border:1px solid rgba(var(--obj-rgb),.95);
    border-radius:7px;
    background:#000;
    box-shadow:0 0 12px rgba(var(--obj-rgb),.62), inset 0 0 8px rgba(var(--obj-rgb),.08);
    pointer-events:none;
    transition:none!important;
    will-change:left;
  }
  .smoothRange .rangeBubble{
    left:var(--potion-pct)!important;
    transition:none!important;
    will-change:left;
  }
  .smoothRange.dragging .smoothTrackThumb{
    box-shadow:0 0 18px rgba(var(--obj-rgb),.78), inset 0 0 10px rgba(var(--obj-rgb),.12);
  }



  /* 153: 물약 게이지 우측 숫자 입력칸 */
  .potionPctLine{
    display:grid;
    grid-template-columns:minmax(0,1fr) 74px;
    gap:8px;
    align-items:center;
  }
  .potionPctLine .neonRangeWrap.smoothRange{
    min-width:0;
  }
  .potionPctInputBox{
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    align-items:center;
    gap:4px;
    height:38px;
    padding:0 7px;
    border:1px solid rgba(var(--obj-rgb),.55);
    border-radius:10px;
    background:rgba(0,0,0,.84);
    box-shadow:0 0 10px rgba(var(--obj-rgb),.16), inset 0 0 8px rgba(var(--obj-rgb),.055);
  }
  .potionPctNumberInput{
    width:100%;
    min-width:0;
    height:30px;
    padding:0;
    border:0;
    outline:0;
    background:transparent;
    color:var(--g);
    font:inherit;
    font-size:14px;
    font-weight:900;
    text-align:right;
    user-select:text!important;
    -webkit-user-select:text!important;
    caret-color:var(--g)!important;
  }
  .potionPctNumberInput::-webkit-outer-spin-button,
  .potionPctNumberInput::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .potionPctInputBox span{
    font-size:11px;
    opacity:.9;
  }
  @media (max-width:374px) and (orientation:portrait){
    .potionPctLine{grid-template-columns:minmax(0,1fr) 66px;gap:6px;}
    .potionPctInputBox{padding:0 5px;}
    .potionPctNumberInput{font-size:13px;}
  }

  /* 룰렛 원판: 원판 안에 확률 구간 표시 + 상단 고정 눈금 */
  .rouletteCase{position:relative;width:230px;margin:4px auto 12px;}
  .topTick{
    position:absolute;
    left:50%;
    top:-3px;
    transform:translateX(-50%);
    z-index:3;
    width:2px;
    height:32px;
    background:var(--g);
    box-shadow:0 0 10px rgba(var(--obj-rgb),.8);
    border-radius:999px;
  }
  .topTick:before{
    content:"";
    position:absolute;
    left:50%;
    top:-5px;
    transform:translateX(-50%);
    width:16px;
    height:8px;
    border:1px solid var(--g);
    background:#000;
    border-radius:2px;
    box-shadow:0 0 10px rgba(var(--obj-rgb),.55);
  }
  .rouletteWheel{
    position:relative;
    margin:10px auto 12px;
    width:220px;
    height:220px;
    border:2px solid var(--g);
    border-radius:50%;
    background:
      conic-gradient(from -90deg,
        rgba(var(--obj-rgb),.10) 0deg 216deg,
        rgba(var(--obj-rgb),.24) 216deg 342deg,
        rgba(var(--obj-rgb),.46) 342deg 360deg);
    box-shadow:0 0 24px rgba(var(--obj-rgb),.25), inset 0 0 20px rgba(var(--obj-rgb),.06);
    transition:transform 2.1s cubic-bezier(.16,.84,.19,1);
    overflow:hidden;
  }
  .rouletteWheel:before,.rouletteWheel:after{
    content:"";
    position:absolute;
    inset:18px;
    border:1px dashed rgba(var(--obj-rgb),.45);
    border-radius:50%;
  }
  .rouletteWheel:after{inset:62px;border-style:solid;}
  .wheelLine{position:absolute;left:50%;top:50%;width:1px;height:110px;background:rgba(var(--obj-rgb),.55);transform-origin:bottom center;}
  .wheelLine.l60{transform:translate(-50%,-100%) rotate(216deg);}
  .wheelLine.l95{transform:translate(-50%,-100%) rotate(342deg);}
  .wheelText{
    position:absolute;
    left:50%;
    top:50%;
    width:78px;
    font-size:10px;
    line-height:1.25;
    text-align:center;
    color:var(--g);
    text-shadow:0 0 8px rgba(var(--obj-rgb),.7);
    pointer-events:none;
  }
  .wheelText.fail{transform:translate(-50%,-50%) rotate(108deg) translateY(-70px) rotate(-108deg);}
  .wheelText.two{transform:translate(-50%,-50%) rotate(279deg) translateY(-70px) rotate(-279deg);}
  .wheelText.three{transform:translate(-50%,-50%) rotate(351deg) translateY(-70px) rotate(-351deg);font-weight:900;}

  /* 스킬 버튼: 이름 표시, 긴 이름 이동, 쿨타임 음영 */
  #actions button{
    position:relative;
    overflow:hidden;
    --cdp:0%;
  }
  #actions button::before{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:var(--cdp,0%);
    background:rgba(var(--obj-rgb),.20);
    box-shadow:inset 0 0 12px rgba(var(--obj-rgb),.18);
    pointer-events:none;
    transition:height .12s linear;
    z-index:0;
  }
  #actions button .skillName,#actions button .cool{
    position:relative;
    z-index:1;
  }
  .skillName{
    display:block;
    width:100%;
    overflow:hidden;
    white-space:nowrap;
    line-height:1.08;
  }
  .skillName.marquee{
    display:inline-block;
    min-width:100%;
    animation:skillNameSlide 3.4s linear infinite;
  }
  @keyframes skillNameSlide{
    0%,18%{transform:translateX(0)}
    76%{transform:translateX(-42%)}
    100%{transform:translateX(0)}
  }

  /* 룰렛: 다수 구역 방식 */
  .rouletteCase.multiCase{position:relative;width:246px;margin:4px auto 12px;}
  .rouletteWheel.multi{
    width:230px;height:230px;
    background:repeating-conic-gradient(from -90deg,
      rgba(var(--obj-rgb),.10) 0deg 30deg,
      rgba(var(--obj-rgb),.18) 30deg 60deg);
    overflow:hidden;
  }
  .rouletteWheel.multi:before{inset:20px;border:1px dashed rgba(var(--obj-rgb),.38);}
  .rouletteWheel.multi:after{inset:68px;border:1px solid rgba(var(--obj-rgb),.52);}
  .wheelCut{
    position:absolute;
    left:50%;top:50%;
    width:1px;height:115px;
    transform-origin:bottom center;
    background:rgba(var(--obj-rgb),.42);
    box-shadow:0 0 5px rgba(var(--obj-rgb),.45);
  }
  .wheelSeg{
    position:absolute;
    left:50%;top:50%;
    width:58px;
    font-size:10px;
    line-height:1;
    text-align:center;
    color:var(--g);
    text-shadow:0 0 7px rgba(var(--obj-rgb),.75);
    pointer-events:none;
  }
  .wheelHub{
    position:absolute;
    left:50%;top:50%;
    width:42px;height:42px;
    transform:translate(-50%,-50%);
    border:1px solid var(--g);
    border-radius:50%;
    background:#000;
    box-shadow:0 0 12px rgba(var(--obj-rgb),.35), inset 0 0 10px rgba(var(--obj-rgb),.08);
    z-index:2;
  }

  /* 스킬명 잘림 보정: 버튼 안에서 이름 영역 확보 + 긴 이름은 전체 글자 이동 */
  #actions button{
    display:flex!important;
    flex-direction:column!important;
    align-items:center!important;
    justify-content:center!important;
    gap:1px!important;
    padding:2px!important;
    min-width:0!important;
    overflow:hidden!important;
  }
  #actions button .skillName{
    display:block!important;
    max-width:100%!important;
    width:100%!important;
    min-height:12px!important;
    font-size:8px!important;
    line-height:1.15!important;
    letter-spacing:-.7px!important;
    overflow:hidden!important;
    white-space:nowrap!important;
    text-overflow:clip!important;
    box-sizing:border-box!important;
  }
  #actions button .skillName.marquee{
    width:max-content!important;
    min-width:100%!important;
    max-width:none!important;
    overflow:visible!important;
    padding-left:2px!important;
    padding-right:18px!important;
    animation:skillNameSlideFull 4.2s linear infinite!important;
  }
  @keyframes skillNameSlideFull{
    0%,16%{transform:translateX(0)}
    76%{transform:translateX(calc(-100% + var(--action-w) - 8px))}
    100%{transform:translateX(0)}
  }
  #actions button .cool{
    font-size:7.5px!important;
    line-height:1!important;
    margin-top:0!important;
  }

  /* 시작/업데이트 화면 */
  .bootScreen{text-align:center;padding:18px 8px;min-height:360px;display:flex;flex-direction:column;justify-content:center;gap:16px;}
  .gameTitle{font-size:28px;font-weight:900;letter-spacing:2px;color:var(--g);text-shadow:0 0 12px rgba(var(--obj-rgb),.75),0 0 28px rgba(var(--obj-rgb),.35);}
  .blinkStart{font-size:13px;color:var(--g);animation:blinkGlow 1.15s ease-in-out infinite;text-shadow:0 0 10px rgba(var(--obj-rgb),.8);}
  @keyframes blinkGlow{0%,100%{opacity:.45;filter:brightness(.8)}50%{opacity:1;filter:brightness(1.55)}}
  .bootPanel{border:1px solid rgba(var(--obj-rgb),.48);border-radius:16px;padding:16px;background:rgba(var(--obj-rgb),.04);box-shadow:inset 0 0 14px rgba(var(--obj-rgb),.06),0 0 16px rgba(var(--obj-rgb),.12);}
  .patchNoteBox{text-align:left;line-height:1.55;font-size:12px;border:1px solid rgba(var(--obj-rgb),.35);border-radius:12px;padding:12px;margin-top:10px;background:rgba(0,0,0,.55);}

  /* 업데이트 진행 게이지 */
  .updateProgressBox{
    width:100%;
    max-width:360px;
    margin:0 auto;
    text-align:left;
  }
  .updateProgressTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    color:var(--g);
    margin-bottom:6px;
    opacity:.9;
  }
  .updateTrack{
    position:relative;
    width:100%;
    height:9px;
    border:1px solid rgba(var(--obj-rgb),.58);
    border-radius:999px;
    background:transparent;
    overflow:hidden;
    box-shadow:0 0 10px rgba(var(--obj-rgb),.18);
  }
  .updateFill{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg,rgba(var(--obj-rgb),.65),rgba(var(--obj-rgb),.95));
    box-shadow:0 0 12px rgba(var(--obj-rgb),.65);
    transition:width .12s linear;
  }
  .updateStatus{
    margin-top:8px;
    font-size:11px;
    color:rgba(var(--obj-rgb),.86);
    min-height:16px;
  }

  /* 스킬 버튼 이름: 애니메이션 제거, 두 줄 표시 */
  #actions button .skillName,
  #actions button .skillName.marquee{
    display:block!important;
    width:100%!important;
    max-width:100%!important;
    min-width:0!important;
    min-height:20px!important;
    max-height:22px!important;
    white-space:normal!important;
    overflow:visible!important;
    text-overflow:clip!important;
    animation:none!important;
    transform:none!important;
    font-size:9px!important;
    line-height:1.08!important;
    letter-spacing:-.5px!important;
    padding:0 1px!important;
    word-break:keep-all!important;
    overflow-wrap:anywhere!important;
  }
  #actions button .cool{font-size:7px!important;line-height:1!important;margin-top:1px!important;}


  /* HUD 하단 정렬 패치: 로케이션 박스와 골드/네온 박스 밑단 맞춤 */
  :root{--location-box-h:24px;}
  .topBtns{grid-template-rows:var(--mini-size) var(--location-box-h)!important;}
  .topBtns #zoneTag{height:var(--location-box-h)!important;}
  .statStack{gap:var(--hud-gap)!important;}
  .statStack #statPanel{min-height:var(--mini-size)!important;}
  .currencyPanel{
    height:var(--location-box-h)!important;
    padding:0 8px!important;
    display:flex!important;
    align-items:center!important;
  }
  .currencyPanel .currencyRow{width:100%;}
  @media (orientation:landscape){:root{--location-box-h:23px;}}
  @media (max-width:374px) and (orientation:portrait){:root{--location-box-h:21px;}}


  /* HUD/버튼 정리 패치: 골드박스 로케이션 박스형, 공격/회피 소형화, 스킬3/4 위치 교체 */
  .currencyPanel{
    border:1px solid var(--gd)!important;
    border-radius:9px!important;
    background:rgba(0,0,0,.72)!important;
    box-shadow:0 0 12px var(--gb), inset 0 0 10px rgba(var(--obj-rgb),.06)!important;
    padding:0 8px!important;
    font-size:10.5px!important;
    line-height:1!important;
  }
  .currencyPanel .currencyRow{
    height:100%;
    display:flex!important;
    align-items:center!important;
    justify-content:center!important;
    gap:12px!important;
  }
  #attackBtn,#dodgeBtn{
    width:calc((var(--joy-size) - 6px) / 2)!important;
    height:36px!important;
    justify-self:center!important;
    align-self:center!important;
    border-radius:10px!important;
    font-size:11px!important;
    padding:3px!important;
  }
  @media (orientation:landscape){
    #attackBtn,#dodgeBtn{height:32px!important;font-size:10px!important;}
  }
  @media (orientation:landscape) and (max-height:430px){

window.addEventListener('error', function(e){
  try{
    var msg=String((e&&e.message)||'unknown');
    window.__neonLastError=msg;
    if(/Maximum call stack size exceeded|too much recursion/i.test(msg)){
      window.__neonStackGuarded=true;
      if(e&&e.preventDefault)e.preventDefault();
      try{console.warn('NEON guarded stack error:',msg);}catch(_){}
      return true;
    }
    if(window.__neonErrorBoxShown)return;
    window.__neonErrorBoxShown=true;
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;top:12px;z-index:99999;border:1px solid #00ff72;background:#000;color:#00ff72;padding:12px;font:12px monospace;white-space:pre-wrap;overflow:auto;box-shadow:0 0 20px rgba(0,255,114,.35);max-height:38vh';
    box.textContent='게임 오류\n' + msg + '\n' + (e.filename||'') + ':' + (e.lineno||'');
    document.body.appendChild(box);
  }catch(_){}
});
window.addEventListener('unhandledrejection', function(e){
  try{
    var r=(e&&e.reason)||'';var m=String((r&&r.message)||r||'unknown');

    box.textContent='게임 로딩 오류\n' + ((e.reason&&e.reason.message)||e.reason||'unknown');

});

  return null;
}
function extendSkillBooksToMax(){
  for(const id in SKILL_BOOK){
    const list=SKILL_BOOK[id]; if(!Array.isArray(list))continue;

      const lv=list.length+1, extra=skillExtraEntry(id,lv-11);

  }
}

function maxSkillRankForJob(jobId=player.job){
  const job=jobById(jobId||player.job||'adventurer')||{};
  const direct=SKILL_BOOK[job.id]||SKILL_BOOK[jobId];
  const listLen=Array.isArray(direct)?direct.length:MAX_SKILL_STAR;
  const configured=Number(job.skillMax)||listLen||MAX_SKILL_STAR;
  return clamp(Math.floor(configured),1,MAX_SKILL_STAR);
}
function skillRequiredLevel(rank,jobId=player.job){
  const job=jobById(jobId||player.job||'adventurer')||{};
  const maxRank=maxSkillRankForJob(job.id||jobId);
  const r=clamp(Math.floor(Number(rank)||1),1,maxRank);
  if(job.id==='adventurer')return 1;
  if(job.tier===1)return [10,14][r-1]||14;
  if(job.tier===2)return [30,33,36,39,42,45][r-1]||45;
  return [1,3,5,8,12,16][r-1]||1;
}
function canUseSkillRank(rank){return Number(player.level||1)>=skillRequiredLevel(rank);}
function skillList(jobId=player.job){const direct=SKILL_BOOK[jobId];if(direct)return direct;const jb=jobById(jobId||'blade');if(jb&&jb.skillBase&&SKILL_BOOK[jb.skillBase])return SKILL_BOOK[jb.skillBase];return SKILL_BOOK.blade;}
function skillStar(jobId=player.job){
  player.skillStars = player.skillStars || {};
  const id=jobId||player.job||'adventurer';
  return clamp(Number(player.skillStars[id]||0),0,maxSkillRankForJob(id));
}
function skillByRank(jobId=player.job, rank=skillStar(jobId)){
  const list=skillList(jobId); const r=clamp(Number(rank)||1,1,maxSkillRankForJob(jobId));
  return list[r-1] || list[0];
}
function skillInfo(jobId=player.job){
  const s=skillStar(jobId);
  return s>0?skillByRank(jobId,s):{name:'미습득', desc:`다음 스킬: ${skillByRank(jobId,1).name} · ${skillByRank(jobId,1).desc}`};
}
function skillCost(jobId=player.job){const s=skillStar(jobId); return s>=MAX_SKILL_STAR?0:(skillByRank(jobId,s+1).cost||SKILL_COSTS[s]);}
function skillScale(rank=skillStar()){
  rank=clamp(rank,0,MAX_SKILL_STAR);
  return {
    // 061 밸런스: 직업별 스킬 수치 추가 하향
    power:.36+rank*.030,
    radius:.58+rank*.015,
    duration:.62+rank*.020,
    countBonus:Math.floor(rank/6),
    cooldown:Math.max(.92,1-rank*.004)
  };
}
function skillStageText(jobId=player.job){const s=skillStar(jobId); return s>=MAX_SKILL_STAR?`${MAX_SKILL_STAR}성 스킬 보유`:s>0?`${s}성 ${skillByRank(jobId,s).name}`:'미습득';}

function monsterNameFor(f,i){
  f=f||{};
  const list=Array.isArray(FIELD_MONSTER_NAMES[f.id])?FIELD_MONSTER_NAMES[f.id]:[];
  const n=list.length?list[((Number(i)||0)%list.length+list.length)%list.length]:'';
  return n||`${f.theme||f.name||'필드'} 몬스터 ${((Number(i)||0)+1)}`;
}
function uniqueMonsterNameForField(f,idx,boss=false){
  f=f||{};
  if(boss)return f.boss||`${f.name||'필드'} 보스`;
  const live=new Set((Array.isArray(monsters)?monsters:[]).filter(m=>m&&!m.dead).map(m=>m.name));
  const list=Array.isArray(FIELD_MONSTER_NAMES[f.id])?FIELD_MONSTER_NAMES[f.id]:[];
  if(list.length){
    for(let step=0;step<list.length;step++){
      const n=list[((Number(idx)||0)+step)%list.length];
      if(n&&!live.has(n))return n;
    }
  }
  monsterNameSerial=(Number(monsterNameSerial)||0)+1;
  let n=`${f.name||'필드'} 개체 ${monsterNameSerial}`;
  while(live.has(n)){monsterNameSerial=(monsterNameSerial+1)%9999;n=`${f.name||'필드'} 개체 ${monsterNameSerial}`;}
  return n;
}
function makeMonsterBook(){
  const book={};
  for(const f of FIELDS.filter(x=>x.id!=='town')){
    book[f.id]=[];
    for(let i=0;i<10;i++) book[f.id].push({name:monsterNameFor(f,i), shape:i, boss:false, seen:0,kills:0});
    book[f.id].push({name:f.boss||`${f.name} 보스`, shape:10, boss:true, seen:0,kills:0});
  }
  return book;
}

function stageFields(){return FIELDS.filter(f=>f&&f.id&&f.id!=='town');}
function stageIndex(id){return stageFields().findIndex(f=>f.id===id);}
function stageField(id){return FIELDS.find(f=>f&&f.id===id)||null;}
function nextStageId(id){const arr=stageFields();const i=stageIndex(id);return i>=0&&i<arr.length-1?arr[i+1].id:null;}

function normalizeStageProgress(){
  if(!player||typeof player!=='object')return;
  player.discoveredFields=(player.discoveredFields&&typeof player.discoveredFields==='object')?player.discoveredFields:{};
  player.clearedFields=(player.clearedFields&&typeof player.clearedFields==='object')?player.clearedFields:{};
  player.openStagePortals=(player.openStagePortals&&typeof player.openStagePortals==='object')?player.openStagePortals:{};
  const first=stageFields()[0];
  if(first)player.discoveredFields[first.id]=true;
  if(player.codex&&typeof player.codex==='object'){
    for(const f of stageFields()){
      const boss=player.codex[f.id]&&player.codex[f.id][10];
      if(boss&&(Number(boss.kills)||0)>0){
        player.clearedFields[f.id]=true;
        if(nextStageId(f.id))player.openStagePortals[f.id]=true;
      }
    }
  }
}
function markFieldDiscovered(id){
  normalizeStageProgress();
  const f=stageField(id);
  if(!f||f.id==='town')return false;
  const was=!!player.discoveredFields[f.id];
  player.discoveredFields[f.id]=true;
  return !was;
}
function isFieldDiscovered(id){
  normalizeStageProgress();
  const f=stageField(id);
  if(!f||f.id==='town')return true;
  return !!player.discoveredFields[f.id];
}
function isBossClearedForField(id){
  normalizeStageProgress();
  if(player.clearedFields&&player.clearedFields[id])return true;
  const boss=player.codex&&player.codex[id]&&player.codex[id][10];
  return !!(boss&&(Number(boss.kills)||0)>0);
}

function stagePortalPoint(type){
  if(!dungeonActive())return null;
  const r=type==='next'?dungeonMap.bossRoom:dungeonMap.startRoom;
  if(!r)return null;
  return {x:r.cx,y:type==='next'?r.cy+Math.min(42,r.h*.18):r.cy+Math.min(36,r.h*.18)};
}
function rebuildStagePortals(){
  if(currentField==='town'||!dungeonActive())return;
  const f=stageField(currentField);
  if(!f)return;
  const start=stagePortalPoint('prev');
  const list=[];
  if(start)list.push({x:start.x,y:start.y,name:'이전 포털',kind:'portal',portalType:'prev',target:prevStageId(currentField)});
  const nx=nextStageId(currentField);
  if(nx&&isNextPortalOpenForField(currentField)){
    const p=stagePortalPoint('next');
    if(p)list.push({x:p.x,y:p.y,name:'다음 포털',kind:'portal',portalType:'next',target:nx});
  }
  npcs=list;
}
function unlockNextPortalForField(id,broadcast=true){
  const f=stageField(id), nx=nextStageId(id);
  if(!f||!nx)return false;
  normalizeStageProgress();
  const already=!!player.openStagePortals[id];
  player.clearedFields[id]=true;
  player.openStagePortals[id]=true;
  if(currentField===id)rebuildStagePortals();
  if(!already){
    const nf=stageField(nx);
    msg(`${f.name} 보스 격파 · ${nf?nf.name:'다음 스테이지'} 포털 개방`, 'system');
    toast('다음 스테이지 포털 개방');
  }
  if(broadcast&&onlineState&&onlineState.partyId){
    try{sendPartyBroadcast('stage_portal_open',{field:id,next:nx,partyId:onlineState.partyId});}catch(e){console.warn(e);}
  }
  requestCloudSave('stagePortal',true);
  return true;
}
function handleStagePortalOpen(p){
  if(!p||!p.field||!p.next)return;
  if(!onlineState.partyId||p.partyId!==onlineState.partyId)return;
  normalizeStageProgress();
  if(!stageField(p.field)||!stageField(p.next))return;
  const already=!!player.openStagePortals[p.field];
  player.clearedFields[p.field]=true;
  player.openStagePortals[p.field]=true;
  if(currentField===p.field)rebuildStagePortals();
  if(!already){
    const f=stageField(p.field), nf=stageField(p.next);
    msg(`[파티] ${f?f.name:'현재 맵'} 보스 클리어 공유 · ${nf?nf.name:'다음 맵'} 포털 개방`, 'system');
    toast('파티 보스 클리어 · 포털 개방');
    requestCloudSave('partyStagePortal',true);
  }
}

function limitPeerVelocity(vx,vy,max=620){

function sanitizePeerPayload(p,seenAt=performance.now()){

    job:String(p.job||'adventurer'),

  if(prev&&field===prevField&&prevTs&&incomingTs+700<prevTs){
    return Object.assign({},prev,identity,{seenAt,moving:!!p.moving||!!prev.moving,visualMoving:!!prev.visualMoving});
  }
  const oldDrawX=Number(prev&&Number.isFinite(Number(prev.drawX))?prev.drawX:x);
  const oldDrawY=Number(prev&&Number.isFinite(Number(prev.drawY))?prev.drawY:y);

  const oldTargetY=Number(prev&&Number.isFinite(Number(prev.targetY))?prev.targetY:y);
  const moved=prev?Math.hypot(x-oldTargetX,y-oldTargetY):0;
  const snap=!prev||field!==prevField||moved>360||Math.hypot(x-oldDrawX,y-oldDrawY)>440;
  const drawX=snap?x:oldDrawX;
  const drawY=snap?y:oldDrawY;
  const dtRemote=prevTs?Math.max(.06,Math.min(1.0,(incomingTs-prevTs)/1000)):.24;
  let vx=Number(p.vx),vy=Number(p.vy);
  if(!Number.isFinite(vx)||!Number.isFinite(vy)){
    vx=(!snap&&dtRemote>0)?(x-oldTargetX)/dtRemote:0;
    vy=(!snap&&dtRemote>0)?(y-oldTargetY)/dtRemote:0;
  }
  const limited=limitPeerVelocity(vx,vy,620);
  vx=limited.vx;vy=limited.vy;
  const dirByMove=(!snap&&moved>2.2)?Math.atan2(y-oldTargetY,x-oldTargetX):(Number(prev&&prev.dir)||0);
  const moving=!!p.moving||(!snap&&moved>1.0)||Math.hypot(vx,vy)>8;

    lastMoveAt:moving?seenAt:(prev&&prev.lastMoveAt)||seenAt,

  const vy=Number(p.vy)||0;
  const sp=Math.hypot(vx,vy);
  const moving=!!p.moving||sp>6||gapBase>0.35;
  let tx=baseX,ty=baseY;
  if(moving&&sp>6){
    const age=Math.max(0,Math.min(.16,(now-(Number(p.seenAt)||now))/1000));
    const predictSec=Math.min(.105,.028+age*.42);
    let ox=vx*predictSec,oy=vy*predictSec;
    const off=Math.hypot(ox,oy);
    if(off>26){const k=26/off;ox*=k;oy*=k;}
    tx=baseX+ox;
    ty=baseY+oy;
  }
  const follow=1-Math.exp(-Math.max(0.001,dt||0.016)*(moving?30:22));
  p.drawX=dx+(tx-dx)*follow;
  p.drawY=dy+(ty-dy)*follow;
  const left=Math.hypot(tx-p.drawX,ty-p.drawY);
  p.visualMoving=left>0.28||gapBase>0.28||now-(Number(p.lastMoveAt)||0)<520;
  if(left<=0.22&&!moving){p.drawX=baseX;p.drawY=baseY;}
}

function skillVisualPoint(actor,target,range=180){

function syncOnlinePresence(){
  try{
    const ch=onlineState.channel;if(!ch)return;
    const previous=onlineState.peers||{};
    const preserved={};
    for(const id in previous){const p=previous[id];if(p&&p.devDummy)preserved[id]=p;}
    const state=ch.presenceState();const now=performance.now();const next={};
    Object.keys(state||{}).forEach(key=>{
      const arr=state[key]||[];
      for(const raw of arr){
        const p=sanitizePeerPayload(raw,now);
        if(p&&p.id){
          announcePeerJoin(p,previous&&previous[p.id]);
          next[p.id]=p;
        }
      }
    });
    for(const id in previous){
      const p=previous[id];
      if(!p||p.id===myOnlineId()||next[id])continue;
      if(p.devDummy)continue;
      if(now-(Number(p.seenAt)||0)<ONLINE_PEER_PRUNE_MS)next[id]=p;
    }
    if(devDummyModeActive())for(const id in preserved)next[id]=preserved[id];
    onlineState.peers=next;
    onlineState.presenceReady=true;
    prunePeerJoinNotice();
  }catch(e){
    console.error(e);
    onlineState.status='동기화 오류';
  }
}

async function trackOnlinePresence(force=false){
  if(typeof document!=='undefined'&&document.hidden&&!force)return false;
  if(onlineState.blocked||!onlineState.channel||!onlineState.enabled)return false;
  if(onlineState.sending)return false;
  const t=performance.now();
  const px=Number(player.x)||0,py=Number(player.y)||0;
  const movedSince=Number.isFinite(Number(onlineState.lastPayloadX))?Math.hypot(px-Number(onlineState.lastPayloadX),py-Number(onlineState.lastPayloadY||0)):0;
  const fieldChanged=onlineState.lastPayloadField&&onlineState.lastPayloadField!==currentField;
  const movingNow=!!player.movingAnim||movedSince>1.0||fieldChanged;
  const minGap=force?ONLINE_SEND_FORCE_GAP:(movingNow?ONLINE_SEND_MOVING_GAP:ONLINE_SEND_IDLE_GAP);
  if(t-(onlineState.lastSend||0)<minGap)return false;
  const prevPayloadX=Number.isFinite(Number(onlineState.lastPayloadX))?Number(onlineState.lastPayloadX):px;
  const prevPayloadY=Number.isFinite(Number(onlineState.lastPayloadY))?Number(onlineState.lastPayloadY):py;
  const prevPayloadAt=Number(onlineState.lastPayloadAt)||0;
  onlineState.lastSend=t;
  onlineState.sending=true;
  const payload=buildOnlinePayload();
  let vx=0,vy=0;
  if(!fieldChanged&&prevPayloadAt>0){
    const dtSec=Math.max(.05,Math.min(1.2,(t-prevPayloadAt)/1000));
    vx=(payload.x-prevPayloadX)/dtSec;
    vy=(payload.y-prevPayloadY)/dtSec;
    const limited=limitPeerVelocity(vx,vy,620);
    vx=limited.vx;vy=limited.vy;
  }
  payload.vx=Math.round(vx*10)/10;
  payload.vy=Math.round(vy*10)/10;
  payload.seq=(onlineState.sendSeq=(Number(onlineState.sendSeq)||0)+1);
  try{
    const shouldTrack=force||!onlineState.lastPresenceTrack||t-(onlineState.lastPresenceTrack||0)>ONLINE_PRESENCE_TRACK_MS;
    if(shouldTrack){
      await onlineState.channel.track(payload);
      onlineState.lastPresenceTrack=t;
    }
    await onlineState.channel.send({type:'broadcast',event:'online_state',payload});
    onlineState.lastPayloadX=payload.x;
    onlineState.lastPayloadY=payload.y;
    onlineState.lastPayloadField=payload.field;
    onlineState.lastPayloadAt=t;
    onlineState.lastHeartbeat=performance.now();
    return true;
  }catch(e){
    console.error(e);
    onlineState.enabled=false;
    onlineState.connecting=false;
    onlineState.status='전송 실패';
    try{if(onlineState.channel)onlineState.channel.unsubscribe();}catch(_){}
    onlineState.channel=null;
    scheduleOnlineReconnect('send_failed',2200);
    return false;
  }finally{
    onlineState.sending=false;
  }
}

function pruneOnlinePeers(){
  const now=performance.now();
  for(const id in onlineState.peers){
    const p=onlineState.peers[id];
    if(!p){delete onlineState.peers[id];continue;}
    if(p.devDummy)continue;
    if(now-(p.seenAt||0)>ONLINE_PEER_PRUNE_MS)delete onlineState.peers[id];
  }
}

function drawRemotePlayerSprite(p){
  if(!p||p.field!==currentField)return;
  const x=Number.isFinite(Number(p.drawX))?Number(p.drawX):Number(p.x);
  const y=Number.isFinite(Number(p.drawY))?Number(p.drawY):Number(p.y);
  if(!Number.isFinite(x)||!Number.isFinite(y))return;
  const age=performance.now()-(Number(p.seenAt)||0);
  if(age>ONLINE_PEER_DRAW_MS)return;
  const maxHp=Math.max(1,Number(p.maxHp)||1);
  const curHp=clamp(Number.isFinite(Number(p.hp))?Number(p.hp):maxHp,0,maxHp);
  const hpPct=clamp(curHp/maxHp,0,1);
  ctx.save();
  ctx.translate(x,y);
  ctx.globalAlpha=clamp(1-age/ONLINE_PEER_DRAW_MS,.62,.96);

  // 본인 캐릭터와 같은 졸라맨 골격/무기 표현을 사용한다.
  const hurt=.9;
  const t=performance.now()/1000;
  const moving=!!p.visualMoving||!!p.moving;
  const step=moving?Math.sin(t*11+(x+y)*.01):0;
  const bob=moving?Math.abs(step)*.95:0;
  const armSwing=moving?step*2.15:0;
  const legSwing=moving?step*4.1:0;
  const atkP=clamp((Number(p.attackAnim)||0)/.24,0,1);
  const swing=Math.sin(atkP*Math.PI);
  const wind=swing*4.5;

  ctx.translate(0,-bob);

  lineStyle(hurt,1.8);
  ctx.beginPath();ctx.arc(0,-24,8,0,Math.PI*2);ctx.stroke();
  lineStyle(.75,.85);ctx.beginPath();ctx.moveTo(-2.5,-26);ctx.lineTo(-2.6,-26.1);ctx.moveTo(2.5,-26);ctx.lineTo(2.6,-26.1);ctx.stroke();

  lineStyle(hurt,1.8);
  ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(0,8);ctx.stroke();

  const shoulderX=0, shoulderY=-9;
  const elbowX=10+armSwing*.18+swing*3.4;
  const elbowY=-6-swing*6.4;
  const gripX=17+wind+swing*6.2;
  const gripY=-6-armSwing*.12+swing*7.5;
  ctx.beginPath();ctx.moveTo(shoulderX,shoulderY);ctx.lineTo(elbowX,elbowY);ctx.lineTo(gripX,gripY);ctx.stroke();

  const leftGripX=-16-armSwing*.28;
  const leftGripY=2+swing*2.1;
  ctx.beginPath();ctx.moveTo(0,-9);ctx.lineTo(-11-armSwing*.32,-4+swing*1.4);ctx.lineTo(leftGripX,leftGripY);ctx.stroke();

  ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(5.6+legSwing*.24,19);ctx.lineTo(7+legSwing*.75,29);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(-5.6-legSwing*.24,19);ctx.lineTo(-7-legSwing*.75,29);ctx.stroke();

  const rawFace=Number.isFinite(Number(p.dir))?Number(p.dir):-Math.PI/2;
  p.weaponFace=angleLerp(Number.isFinite(Number(p.weaponFace))?Number(p.weaponFace):rawFace,rawFace,.18);
  const bladeAngle=p.weaponFace;
  drawClassWeapon(p.job||'adventurer',gripX,gripY,bladeAngle,atkP,leftGripX,leftGripY,{equip:sanitizePeerEquip(p.equip||{}),attackAnim:Number(p.attackAnim)||0});

  lineStyle((p.partyId&&onlineState.partyId&&p.partyId===onlineState.partyId)?0.78:0.52,1);
  ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.stroke();

  ctx.shadowBlur=0;
  ctx.textAlign='center';
  ctx.font='11px monospace';
  ctx.fillStyle=themeLine(.98);
  ctx.fillText(`Lv.${p.level||1} ${sanitizeNickname(p.name||'플레이어')}`,0,-42);

  const hpW=58,hpH=8,hpY=-34;
  ctx.save();
  ctx.shadowColor=themeLine(.7);
  ctx.shadowBlur=7;
  ctx.fillStyle=themeBg();
  ctx.fillRect(-hpW/2,hpY,hpW,hpH);
  ctx.strokeStyle=themeLine(.95);
  ctx.lineWidth=1;
  ctx.strokeRect(-hpW/2+.5,hpY+.5,hpW-1,hpH-1);
  ctx.fillStyle=themeLine(.96);
  ctx.fillRect(-hpW/2+2,hpY+2,(hpW-4)*hpPct,hpH-4);
  ctx.restore();

  ctx.restore();
}

function repairEquipmentRuntime(){
  normalizePlayer();

  player.equip=Object.assign({weapon:null,armor:null,helmet:null,boots:null,ring:null,amulet:null,relic:null},player.equip||{});
  const seen=new Set();
  player.inventory=player.inventory.filter(it=>{
    if(seen.has(it.id))return false;
    seen.add(it.id);return true;
  });
  for(const slot of Object.keys(player.equip)){

    const inv=player.inventory.find(x=>x.id===it.id);
    if(inv)player.equip[slot]=inv;
    else player.inventory.push(it);

  const equippedIds=new Set();

    equippedIds.add(it.id);
  }
  for(const it of player.inventory){

function buildDungeonMap(f){
  if(!f||f.id==='town')return null;
  const fs=Number(f.size)||fieldSize||2200;
  const level=Number(f.level)||1;
  const layout=DUNGEON_LAYOUTS[f.id]||DUNGEON_LAYOUTS.plain;
  const jitter=Math.min(80,Math.max(18,fs*.012));
  const j=(seed)=>Math.sin((level+1)*12.9898+seed*78.233)*jitter;

    else {pushCorridorRect((A.cx+B.cx)/2-cw/2,Math.min(A.cy,B.cy)-cw/2,cw,dy+cw,a,b);addWaypoint((A.cx+B.cx)/2,(A.cy+B.cy)/2,-1);} 
  }
  function addLCorridor(a,b,wide=1,flip=false){
    const A=rooms[a],B=rooms[b]; if(!A||!B)return;
    const cw=dungeonClamp(fs*(.044+wide*.005),104,188);
    if(flip){
      // A 방에서 먼저 세로로 빠져나간 뒤 B 방 높이에서 가로로 연결한다.
      // 이전 방식은 flip=true일 때 양 끝에 짧은 조각만 생겨 일부 방이 닫혀 보일 수 있었다.
      pushCorridorRect(A.cx-cw/2,Math.min(A.cy,B.cy)-cw/2,cw,Math.abs(B.cy-A.cy)+cw,a,b);
      pushCorridorRect(Math.min(A.cx,B.cx)-cw/2,B.cy-cw/2,Math.abs(B.cx-A.cx)+cw,cw,a,b);
      addWaypoint(A.cx,B.cy,-1);
    }else{
      // A 방 높이에서 가로로 나가고 B 방 중심선으로 세로 연결한다.
      pushCorridorRect(Math.min(A.cx,B.cx)-cw/2,A.cy-cw/2,Math.abs(B.cx-A.cx)+cw,cw,a,b);
      pushCorridorRect(B.cx-cw/2,Math.min(A.cy,B.cy)-cw/2,cw,Math.abs(B.cy-A.cy)+cw,a,b);
      addWaypoint(B.cx,A.cy,-1);
    }
  }
  function addZCorridor(a,b,wide=1){
    const A=rooms[a],B=rooms[b]; if(!A||!B)return;
    const cw=dungeonClamp(fs*(.040+wide*.005),90,164);
    const midY=(A.cy+B.cy)/2;
    pushCorridorRect(A.cx-cw/2,Math.min(A.cy,midY)-cw/2,cw,Math.abs(midY-A.cy)+cw,a,b);
    pushCorridorRect(Math.min(A.cx,B.cx)-cw/2,midY-cw/2,Math.abs(B.cx-A.cx)+cw,cw,a,b);
    pushCorridorRect(B.cx-cw/2,Math.min(midY,B.cy)-cw/2,cw,Math.abs(B.cy-midY)+cw,a,b);
    addWaypoint(A.cx,midY,-1); addWaypoint(B.cx,midY,-1);
  }
  function addCorridor(a,b,idx){

      seen.add(best.to);

  const walkables=[...corridors,...rooms];
  const wallSegments=computeDungeonBoundarySegments(walkables);
  return {fieldId:f.id,layout:layout.corridor,rooms,corridors,walkables,wallSegments,links,waypoints,bossRoom:rooms.find(r=>r.type==='boss'),startRoom:rooms.find(r=>r.type==='start')};
}

  if(['blade','assassin','monk','berserker'].includes(base)||['blade','assassin','monk','berserker'].includes(job.id)){weights.atk=3.7;weights.lifesteal=22;weights.aspd=35;}
  let score=(it.level||1)*8 + (RARITIES.find(r=>r.name===it.rarity)?.mult||1)*30;

}
function makeItem(level=1,rarityName=null,slot=null,jobId=null){
  const rarity = rarityName ? RARITIES.find(r=>r.name===rarityName) : chooseWeighted(RARITIES);
  const type = pickItemTypeForJob(slot, jobId||(typeof player!=='undefined'&&player.job)||'blade');

  const item={id:cryptoId(),name:`${prefix} ${type.name}`,slot:type.slot,level,rarity:rarity.name,stats:{},equipped:false};
  const statCount = rarity.name==='일반'?2:(rarity.name==='레어'?2:(rarity.name==='희귀'?3:(rarity.name==='에픽'?3:(rarity.name==='전설'?4:5))));
  const pool=[...type.stats];
  for(let i=0;i<statCount;i++){
    if(pool.length===0)pool.push(...type.stats);
    const st=pool.splice(irnd(0,pool.length-1),1)[0]||type.stats[0];
    const base=(level+2)*rarity.mult;
    let val=1;
    if(st==='atk') val=fmt(base*rnd(.7,1.22));
    else if(st==='hp') val=Math.max(5,Math.round(base*rnd(6,12)));
    else if(st==='def') val=Math.max(.5,fmt(base*rnd(.32,.82)));
    else if(st==='speed') val=Math.max(2,fmt(rnd(4,10)*rarity.mult));
    else if(st==='aspd') val=Math.max(.02,fmtSmall(rnd(.025,.075)*rarity.mult));
    else if(st==='lifesteal') val=Math.max(.002,fmtSmall(rnd(.003,.012)*rarity.mult));
    else if(st==='crit'||st==='dodge'||st==='reflect'||st==='expBonus'||st==='goldBonus'||st==='cooldown') val=Math.max(.01,fmtSmall(rnd(.02,.06)*rarity.mult));
    else if(st==='critDmg') val=Math.max(.05,fmtSmall(rnd(.08,.22)*rarity.mult));
    else if(st==='hpRegen') val=Math.max(.2,fmt(rnd(.5,1.6)*rarity.mult));
    else if(st==='skillPower'||st==='summonPower'||st==='mpRegen') val=Math.max(.04,fmtSmall(rnd(.08,.24)*rarity.mult));
    else if(st==='range') val=Math.max(6,fmt(rnd(10,28)*rarity.mult));
    else if(st==='magnet') val=Math.max(8,fmt(rnd(12,38)*rarity.mult));
    else if(st==='all') val=Math.max(.5,fmt(rnd(1.0,2.8)*rarity.mult));
    item.stats[st]=(item.stats[st]||0)+val;
  }
  if(type.slot==='weapon'){
    const j=jobById(jobId||(typeof player!=='undefined'&&player.job)||'blade');
    if(j.weaponName && Math.random()<.55)item.name=j.weaponName;
  }
  return item;
}

/* patch 061: harsher level gap balance */
function levelGapBalance(monster){
  const ml=Math.max(1,Math.floor(Number(monster&&monster.level)||1));
  const pl=Math.max(1,Math.floor(Number(player&&player.level)||1));
  const diff=pl-ml; // positive: player is higher
  let deal=1, take=1, exp=1, gold=1, drop=1;
  if(diff<=-20){
    deal=.025; take=3.8; exp=1.55; gold=1.28; drop=1.18;
  }else if(diff<=-15){
    deal=.05; take=3.15; exp=1.42; gold=1.20; drop=1.13;
  }else if(diff<=-10){
    deal=.10; take=2.65; exp=1.28; gold=1.12; drop=1.08;
  }else if(diff<0){
    const under=Math.abs(diff);
    deal=clamp(1-under*.075,.20,1);
    take=clamp(1+under*.13,1,2.4);
    exp=clamp(1+under*.028,1,1.22);
    gold=clamp(1+under*.018,1,1.12);
    drop=clamp(1+under*.012,1,1.08);
  }else if(diff>=25){
    deal=.82; take=.18; exp=.02; gold=.04; drop=.04;
  }else if(diff>=10){
    deal=.90; take=.28; exp=.08; gold=.12; drop=.10;
  }else if(diff>0){
    deal=clamp(1-diff*.006,.90,1);
    take=clamp(1-diff*.055,.35,1);
    exp=clamp(1-diff*.08,.10,1);
    gold=clamp(1-diff*.065,.12,1);
    drop=clamp(1-diff*.06,.10,1);
  }
  return {diff,deal,take,exp,gold,drop,playerLevel:pl,monsterLevel:ml};
}
function levelGapLabel(monster){
  const b=levelGapBalance(monster);
  if(b.diff<=-6)return '위험';
  if(b.diff>=10)return '저레벨';
  return '';
}

function doDamage(target,base,kind='hit',canCrit=true){
  if(!target || target.dead)return 0;
  const st=computeStats(); const lb=levelGapBalance(target); let dmg=Math.max(1,base-(target.def||0)*0.45);
  let crit=false; if(canCrit && Math.random()<st.crit){crit=true;dmg*=1.5+st.critDmg;}
  if(target.weak)dmg*=1.25;
  dmg=Math.max(1,Math.floor(dmg*lb.deal*rnd(.84,1.08)));
  target.hp-=dmg; target.hit=.18;
  try{recordMonsterDamage(target,myOnlineId(),sanitizeNickname(player.nickname||'플레이어'),dmg);}catch(_){ }
  effects.push({type:'text',x:target.x,y:target.y-22,t:crit?`CRIT ${dmg}`:`${dmg}`,life:.75,vy:-28,big:crit});
  effects.push({type:'spark',x:target.x,y:target.y,life:.25,r:8+Math.random()*8});
  // 흡혈 수정: 실제 피해량 기준으로 즉시 회복한다. 장비/성장/직업 흡혈이 모두 여기로 들어온다.
  if(st.lifesteal>0 && dmg>0){
    const heal=Math.max(1,Math.floor(dmg*st.lifesteal));
    if(player.hp<player.maxHp){player.hp=clamp(player.hp+heal,0,player.maxHp);}
  }
  if(target.hp<=0) killMonster(target);
  return dmg;
}

  while(player.exp>=player.nextExp){player.exp-=player.nextExp;player.level++;player.nextExp=Math.round(player.nextExp*1.32+18);pendingLevelUps++;player.hp=player.maxHp;}

function skillCooldownFactor(aj,slot,rank,jobId){
  slot=clamp(Number(slot)||1,1,ACTION_SLOT_COUNT);
  rank=clamp(Number(rank)||1,1,MAX_SKILL_STAR);
  const job=jobById(jobId||player.job||aj)||{};
  const base=job.skillBase||aj||'blade';
  // 126: 직업/슬롯/성급별 쿨타임을 확실히 분리한다.
  // 낮은 성급은 짧고, 고성급/광역/소환/궁극 계열은 길게 잡는다.
  const slotTable={
    blade:[.78,1.02,1.34,1.72],
    warrior:[.82,1.06,1.38,1.78],
    berserker:[.76,1.12,1.48,1.95],
    assassin:[.62,.90,1.24,1.58],
    ranger:[.86,1.10,1.42,1.88],
    gunner:[.78,1.02,1.48,2.05],
    sniper:[1.05,1.38,1.82,2.40],
    mage:[1.00,1.32,1.74,2.28],
    psion:[.96,1.28,1.72,2.24],
    chronomancer:[.88,1.18,1.56,2.08],
    hexer:[1.08,1.42,1.86,2.45],
    necromancer:[1.12,1.46,1.92,2.52],
    alchemist:[.92,1.30,1.82,2.48],
    summoner:[1.06,1.48,2.02,2.72],
    druid:[.98,1.38,1.92,2.60],
    mechanic:[.94,1.34,1.96,2.78],
    engineer:[1.00,1.46,2.12,2.92],
    mirror:[.92,1.22,1.64,2.10],
    paladin:[.96,1.26,1.72,2.24],
    warden:[1.02,1.34,1.82,2.36],
    priest:[1.08,1.42,1.88,2.44],
    bard:[.82,1.14,1.54,2.06],
    artificer:[1.04,1.48,2.04,2.82],
    wildDruid:[.86,1.22,1.70,2.30],
    adventurer:[.82,1.06,1.36,1.74],
    legendaryHero:[.70,.98,1.36,1.86]
  };
  const byJob=slotTable[job.id]||slotTable[base]||[.86,1.16,1.58,2.08];
  let factor=byJob[slot-1]||1;
  const rankTier=rank>=12?2.05:rank>=11?1.72:rank>=9?1.42:rank>=7?1.25:rank>=5?1.10:1;
  const powerTax=(rank*rank)*0.006;
  return Math.max(.55,factor*(rankTier+powerTax));
}

function summonerKindByRank(rank,index=0,skillName=''){
  rank=clamp(Math.floor(Number(rank)||1),1,MAX_SKILL_STAR||12);
  const map={
    1:'clone',2:'twin',3:'guardian',4:'familiar',5:'swarm',6:'beast',
    7:'soulCircle',8:'legion',9:'contract',10:'transcend',11:'dragon',12:'celestial'
  };
  let kind=map[rank]||'spirit';
  // 같은 스킬 안에서 여러 마리가 나와도 기본 형태는 유지하되 위치 장식만 다르게 쓸 수 있게 번호를 보존한다.
  return kind;

function summonFollowsOwner(s){
  const k=String(s&&s.kind||'');

}

function summonAttackCooldown(s){
  if(!s)return .85;
  if(Number.isFinite(Number(s.attackCd)))return Math.max(.18,Number(s.attackCd));
  const k=String(s.kind||'spirit');
  const baseMap={
    turret:.58,spirit:.88,clone:.82,twin:.72,guardian:1.10,familiar:.62,swarm:.46,
    beast:.96,soulCircle:.78,legion:.70,contract:1.05,transcend:.64,dragon:1.14,celestial:.90
  };
  const base=baseMap[k]||.84;
  const power=Math.max(.5,Math.min(2.4,Number(s.atk)||1));
  const heavy=['guardian','beast','contract','dragon'].includes(k)?1.08:1;
  const quick=['swarm','familiar','transcend'].includes(k)?.92:1;
  return Math.max(.24,base*heavy*quick*(power>80?.92:1));
}

function linePointDistance(px,py,ax,ay,bx,by){
  const vx=bx-ax,vy=by-ay, wx=px-ax,wy=py-ay;
  const len2=vx*vx+vy*vy||1;
  const t=clamp((wx*vx+wy*vy)/len2,0,1);
  const cx=ax+vx*t, cy=ay+vy*t;
  return {d:Math.hypot(px-cx,py-cy),t,cx,cy};
}
function damageBladeLine(ax,ay,bx,by,width,damage,label='bladeLine'){
  let hit=0;
  for(const m of monsters){
    if(!m||m.dead)continue;
    const p=linePointDistance(m.x,m.y,ax,ay,bx,by);
    if(p.d<=width && dungeonLineWalkable(ax,ay,m.x,m.y,8)){
      doDamage(m,damage,label,false);
      hit++;
    }
  }
  return hit;
}
function safeBladeDash(actor,angle,len,rad=22){
  const ox=actor.x,oy=actor.y;
  let best={x:ox,y:oy};
  for(let f=1;f>=.18;f-=.12){
    const nx=clamp(ox+Math.cos(angle)*len*f,rad+6,fieldSize-rad-6);
    const ny=clamp(oy+Math.sin(angle)*len*f,rad+6,fieldSize-rad-6);
    if(!dungeonActive() || (dungeonPointWalkable(nx,ny,rad)&&dungeonLineWalkable(ox,oy,nx,ny,rad))){best={x:nx,y:ny};break;}
  }
  actor.x=best.x; actor.y=best.y;
  try{resolveDungeonEntity(actor,ox,oy,rad);}catch(_){ }
  return {ox,oy,x:actor.x,y:actor.y};
}

function warriorSkillAnimRank(skillName='',fallbackRank=0){
  const n=String(skillName||'').replace(/\s+/g,'');
  if(n.includes('선검')||n.includes('찌르기'))return 1;
  if(n.includes('전진')&&n.includes('베기'))return 2;
  if(n.includes('십자참')||n.includes('십자'))return 3;
  if(n.includes('회전베기')||n.includes('회전검')||n.includes('회전'))return 4;
  return Number(fallbackRank)>=1&&Number(fallbackRank)<=4?Number(fallbackRank):0;
}

function usePotion(key=null,silent=false){

function handlePlayerDeath(source=null){
  normalizePlayer();
  const curExp=Math.max(0,Math.floor(Number(player.exp)||0));
  const nextExp=Math.max(1,Math.floor(Number(player.nextExp)||100));
  const curGold=Math.max(0,Math.floor(Number(player.gold)||0));
  const expLoss=Math.min(curExp,Math.max(3,Math.round(nextExp*.08)));
  const goldLoss=Math.min(curGold,Math.max(20,Math.round(curGold*.08)));
  player.exp=Math.max(0,curExp-expLoss);
  player.gold=Math.max(0,curGold-goldLoss);
  player.hp=player.maxHp;
  player.shield=0;
  player.dashTime=0;
  player.hurt=0;
  player.autoPathCache=null;
  player.autoStuckTimer=0;
  enterField('town');
  updateHud();
  const reason=source&&source.name?` · ${source.name}`:'';
  msg(`사망 패널티${reason} · -${expLoss}XP -${goldLoss}G`, 'system');
  toast(`쓰러짐 · 경험치 ${expLoss} / 골드 ${goldLoss} 감소`);
  requestCloudSave('deathPenalty',true);
}
function playerHit(dmg,source){
  const st=computeStats();
  if(player.dashTime>0 || Math.random()<st.dodge){effects.push({type:'text',x:player.x,y:player.y-28,t:'회피',life:.65,vy:-22});return;}
  const lb=source?levelGapBalance(source):{take:1};
  let final=Math.max(1,Math.round((dmg-st.def*.65)*lb.take));
  if(player.shield>0 || buffMod('shield')>0) final=Math.max(1,Math.round(final*.45));
  player.hp-=final; player.hurt=.25;
  effects.push({type:'text',x:player.x,y:player.y-26,t:`-${final}`,life:.6,vy:-20});
  if(source && st.reflect>0){const rd=Math.max(1,Math.round(final*st.reflect));doDamage(source,rd,'reflect',false);effects.push({type:'text',x:source.x,y:source.y-40,t:`반사 ${rd}`,life:.7,vy:-22});}
  if(player.hp<=0)handlePlayerDeath(source);
}

function nerfGrowthValue059(stat,value){
  // 061 밸런스: 레벨업 보너스 스탯을 기존 059보다 추가 하향
  const pctStats=['aspd','crit','critDmg','lifesteal','skillPower','summonPower','dodge','reflect','expBonus','goldBonus','cooldown','mpRegen'];
  let factor=.28;
  if(stat==='hp')factor=.26;
  else if(stat==='atk'||stat==='def')factor=.30;
  else if(stat==='speed'||stat==='range')factor=.24;
  else if(stat==='lifesteal')factor=.08;
  else if(pctStats.includes(stat))factor=.22;
  const v=Number(value)||0;
  if(pctStats.includes(stat))return fmtSmall(v*factor);
  if(stat==='hp'||stat==='range'||stat==='speed')return Math.max(1,Math.round(v*factor));
  return fmt(v*factor);
}
function makeGrowthOptions(){
  const rarityPool=RARITIES.map(r=>({name:r.name,weight:r.weight}));
  const job=jobById(player.job||'blade');
  const stats=(job.growthStats&&job.growthStats.length?job.growthStats:['atk','hp','def','speed','aspd','crit']).filter(s=>s==='reflect'?job.id==='mirror':true);
  const out=[]; const used=new Set(); let guard=0;
  while(out.length<3 && guard++<80){
    const stat=stats[irnd(0,stats.length-1)]; if(!stat||used.has(stat))continue; used.add(stat);
    const rarity=chooseWeighted(rarityPool).name; const mult=RARITIES.find(r=>r.name===rarity).mult; let value=1;
    if(stat==='atk') value=fmt((2.4+player.level*.72)*mult); else if(stat==='hp') value=Math.round((22+player.level*5.2)*mult); else if(stat==='def') value=fmt((1.3+player.level*.32)*mult); else if(stat==='speed') value=fmt((4.2+player.level*.14)*mult); else if(stat==='aspd') value=fmtSmall((.04+player.level*.00135)*mult); else if(stat==='crit') value=fmtSmall((.038+player.level*.001)*mult); else if(stat==='critDmg') value=fmtSmall((.12+player.level*.0024)*mult); else if(stat==='lifesteal') value=fmtSmall((.022+player.level*.00055)*mult); else if(stat==='hpRegen') value=fmt((.75+player.level*.09)*mult); else if(stat==='skillPower'||stat==='summonPower') value=fmtSmall((.085+player.level*.0018)*mult); else if(stat==='range') value=fmt((10+player.level*.42)*mult); else if(stat==='dodge') value=fmtSmall((.026+player.level*.00065)*mult); else if(stat==='reflect') value=fmtSmall((.055+player.level*.0011)*mult); else if(stat==='expBonus'||stat==='goldBonus') value=fmtSmall((.045+player.level*.0009)*mult); else if(stat==='cooldown') value=fmtSmall((.022+player.level*.00055)*mult); else if(stat==='mpRegen') value=fmtSmall((.08+player.level*.001)*mult);
    value=nerfGrowthValue059(stat,value);
    out.push({id:cryptoId(),stat,value,rarity,name:`${rarity} ${STAT_LABEL[stat]} 성장`});
  }
  while(out.length<3){const stat=['atk','hp','def'][out.length];const raw=stat==='hp'?30:3;out.push({id:cryptoId(),stat,value:nerfGrowthValue059(stat,raw),rarity:'일반',name:`일반 ${STAT_LABEL[stat]} 성장`});}
  return out;
}

function jobUnlockStatus(job){
  const u=job.unlock||{};const fail=[];
  if(u.level&&player.level<u.level)fail.push(`레벨 ${u.level}`);
  if(u.requireCurrentJob&&player.job!==u.requireCurrentJob)fail.push(`${jobById(u.requireCurrentJob).name} 상태`);
  if(u.totalKills&&player.totalKills<u.totalKills)fail.push(`누적 처치 ${u.totalKills}`);
  if(u.bossKills&&bossKillsTotal()<u.bossKills)fail.push(`보스 처치 ${u.bossKills}`);
  if(u.gold&&player.gold<u.gold)fail.push(`보유 골드 ${u.gold}G`);
  if(u.guildTokens&&player.guildTokens<u.guildTokens)fail.push(`길드 토큰 ${u.guildTokens}`);
  if(Array.isArray(u.requireJobs)&&u.requireJobs.length){const hist=Array.isArray(player.jobHistory)?player.jobHistory:[];const ok=u.requireJobs.includes(player.job)||u.requireJobs.some(id=>hist.includes(id));if(!ok)fail.push('필요 직업 흔적');}
  return {ok:fail.length===0,fail,hint:u.hint||''};
}

function autoThreatInfo(range=760){

  }
  return {nearest,d:nearD,pressure,awayX:px,awayY:py};
}

function smoothAutoVector(dx,dy,rate=.12){
  const len=Math.hypot(dx,dy)||0.001;
  const tx=dx/len, ty=dy/len;
  player.autoVX=Number.isFinite(player.autoVX)?player.autoVX:tx;
  player.autoVY=Number.isFinite(player.autoVY)?player.autoVY:ty;
  player.autoVX += (tx-player.autoVX)*clamp(rate,0,1);
  player.autoVY += (ty-player.autoVY)*clamp(rate,0,1);
  const n=Math.hypot(player.autoVX,player.autoVY)||0.001;
  player.autoVX/=n; player.autoVY/=n;
  return {x:player.autoVX,y:player.autoVY};
}

function findEscapePoint(o,rad=18,targetX=null,targetY=null){
  if(!o)return null;
  if(!dungeonActive())return {x:clamp(o.x,rad,fieldSize-rad),y:clamp(o.y,rad,fieldSize-rad)};
  if(!dungeonPointWalkable(o.x,o.y,rad))return nearestDungeonPoint(o.x,o.y,rad);
  const hasTarget=Number.isFinite(Number(targetX))&&Number.isFinite(Number(targetY));
  const base=hasTarget?Math.atan2(Number(targetY)-o.y,Number(targetX)-o.x):Number(o.dir)||0;
  const dirs=[base+Math.PI/2,base-Math.PI/2,base,base+Math.PI,base+Math.PI/4,base-Math.PI/4,base+Math.PI*.75,base-Math.PI*.75,0,Math.PI/2,Math.PI,Math.PI*1.5];

      if(!dungeonLineWalkable(o.x,o.y,x,y,Math.max(6,rad*.55)))continue;

function chooseDropOwnerForMonster(m){
  if(onlineState.partyId){

    onlineState.partyLootIndex=(idx+1)%Math.max(1,arr.length);
    const pick=arr[idx%arr.length]||arr[0];

  }

function actorForDropOwner(drop){

    const d=onlineState.peers&&onlineState.peers[drop.ownerId];
    if(d&&d.field===currentField)return {kind:'dummy',actor:d,range:145};
  }

}

function collectDrop(d,collector=null){
  if(!d||d.picked||!d.item)return;
  d.picked=true; d.life=-1;
  const info=collector||actorForDropOwner(d);
  if(info.kind==='dummy'&&info.actor){
    devDummyEquipLoot(info.actor,d.item);
    effects.push({type:'text',x:info.actor.x,y:info.actor.y-48,t:`획득 ${d.item.name}`,life:1,vy:-22,big:false});
    return;
  }
  player.inventory.push(d.item);
  player.discoveredItems[d.item.name]=true;
  effects.push({type:'text',x:player.x,y:player.y-48,t:`획득 ${d.item.name}`,life:1,vy:-22,big:false});
  toast(`${d.item.rarity} 장비 획득`);
}
function updateDrops(dt){
  for(const d of drops){
    if(d.picked)continue;
    d.life-=dt;
    const info=actorForDropOwner(d);
    const a=info.actor||player;
    const ax=Number(a.x)||player.x, ay=Number(a.y)||player.y;
    const dx=ax-d.x,dy=ay-d.y,dd=Math.hypot(dx,dy);
    const range=info.range||120;
    if(dd<range){
      const pull=clamp(180+range*1.4,240,900);
      const ux=dd>0?dx/dd:0,uy=dd>0?dy/dd:0;
      d.x+=ux*pull*dt; d.y+=uy*pull*dt;
      d.life=Math.max(d.life,8);
    }
    if(dd<24)collectDrop(d,info);
  }
  drops=drops.filter(d=>!d.picked&&d.life>0);
}

function drawPerspectiveFloor(theme){

    ctx.moveTo(0,y);
    ctx.lineTo(W,y);
    ctx.stroke();
  }
  lineStyle(.11,1);
  for(let x=-W;x<W*2;x+=110){
    ctx.beginPath();
    ctx.moveTo(vpX,horizon);
    ctx.lineTo(x,H);
    ctx.stroke();
  }
  lineStyle(.08,1);
  if(theme==='철로'){
    ctx.beginPath();
    ctx.moveTo(vpX-28,horizon); ctx.lineTo(W*.28,H);

function drawFieldGround(){

  const theme=f.theme||'필드';
  const left=Math.max(0,camera.x-180),right=Math.min(fieldSize,camera.x+W+180),top=Math.max(0,camera.y-180),bottom=Math.min(fieldSize,camera.y+H+180);

  function isoDiamond(x,y,w,h){
    ctx.beginPath();
    ctx.moveTo(x,y-h);
    ctx.lineTo(x+w,y);
    ctx.lineTo(x,y+h);
    ctx.lineTo(x-w,y);
    ctx.closePath();
  }
  function drawIsoGrid(step=140, major=420){
    // 작은 다이아몬드 망
    lineStyle(.12,1);
    for(let s=Math.floor((left+top)/step)*step; s<=right+bottom; s+=step){
      ctx.beginPath();
      ctx.moveTo(left,s-left);
      ctx.lineTo(right,s-right);
      ctx.stroke();
    }
    for(let d=Math.floor((left-bottom)/step)*step; d<=right-top; d+=step){
      ctx.beginPath();
      ctx.moveTo(left,left-d);
      ctx.lineTo(right,right-d);
      ctx.stroke();
    }

    lineStyle(.24,1.4);

      ctx.beginPath();
      ctx.moveTo(left,s-left);
      ctx.lineTo(right,s-right);
      ctx.stroke();
    }
    for(let d=Math.floor((left-bottom)/major)*major; d<=right-top; d+=major){
      ctx.beginPath();
      ctx.moveTo(left,left-d);
      ctx.lineTo(right,right-d);
      ctx.stroke();
    }
  }

  ctx.save();

  // 2.5D 바닥 기준선
  drawIsoGrid(120, 420);

  lineStyle(.30,1.25);

  if(theme==='폐허'){
    for(let i=0;i<18;i++){
      const x=(i*283)%fieldSize, y=(i*191+120)%fieldSize;

      isoDiamond(x,y,62,30); ctx.stroke();

function drawClassWeapon(jobId, gripX, gripY, bladeAngle, atkP, leftGripX, leftGripY, actor){
  actor=actor||player||{};
  const jb=jobById(jobId||'blade');
  const job=jb.weaponBase||jb.skillBase||jobId||'blade';
  const ux=Math.cos(bladeAngle), uy=Math.sin(bladeAngle), px=Math.cos(bladeAngle+Math.PI/2), py=Math.sin(bladeAngle+Math.PI/2);
  const line=(a,w,fn)=>{lineStyle(a,w);ctx.beginPath();fn();ctx.stroke();};
  const orb=(x,y,r,a=.85)=>{lineStyle(a,1.4);ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();};
  if((jb.id==='adventurer') || (actor.equip&&actor.equip.weapon&&['나뭇가지','몽둥이'].includes(actor.equip.weapon.name))){
    const buttX=gripX-ux*11, buttY=gripY-uy*11;

    const twig2X=gripX+ux*28-px*6.2, twig2Y=gripY+uy*28-py*6.2;
    line(.95,2.25,()=>{ctx.moveTo(buttX,buttY);ctx.lineTo(gripX,gripY);ctx.lineTo(midX,midY);ctx.lineTo(tipX,tipY);});
    line(.76,1.05,()=>{ctx.moveTo(buttX+px*1.6,buttY+py*1.6);ctx.lineTo(gripX+px*.9,gripY+py*.9);ctx.lineTo(midX+px*.8,midY+py*.8);});
    line(.88,1.45,()=>{ctx.moveTo(gripX+ux*13,gripY+uy*13);ctx.lineTo(twig1X,twig1Y);ctx.moveTo(gripX+ux*24,gripY+uy*24);ctx.lineTo(twig2X,twig2Y);});
    line(.7,1.0,()=>{ctx.moveTo(tipX-px*2.3,tipY-py*2.3);ctx.lineTo(tipX+px*1.3,tipY+py*1.3);ctx.moveTo(twig1X-px*1.4,twig1Y-py*1.4);ctx.lineTo(twig1X+ux*2.2,twig1Y+uy*2.2);ctx.moveTo(twig2X+px*1.3,twig2Y+py*1.3);ctx.lineTo(twig2X+ux*1.8,twig2Y+uy*1.8);});
    return;
  }
  if(job==='ranger'){
    const bowX=gripX+ux*8, bowY=gripY+uy*8, r=23, pull=(Number(actor.attackAnim)||0)>0?Math.sin(atkP*Math.PI)*7:2;
    line(1,1.8,()=>{ctx.arc(bowX,bowY,r,bladeAngle-Math.PI*.55,bladeAngle+Math.PI*.55);});
    line(.78,1,()=>{ctx.moveTo(bowX+Math.cos(bladeAngle-Math.PI*.55)*r,bowY+Math.sin(bladeAngle-Math.PI*.55)*r);ctx.lineTo(gripX-px*pull,gripY-py*pull);ctx.lineTo(bowX+Math.cos(bladeAngle+Math.PI*.55)*r,bowY+Math.sin(bladeAngle+Math.PI*.55)*r);});
    line(.95,1.4,()=>{ctx.moveTo(gripX-ux*11,gripY-uy*11);ctx.lineTo(gripX+ux*26,gripY+uy*26);ctx.moveTo(gripX+ux*26,gripY+uy*26);ctx.lineTo(gripX+ux*18+px*4,gripY+uy*18+py*4);ctx.moveTo(gripX+ux*26,gripY+uy*26);ctx.lineTo(gripX+ux*18-px*4,gripY+uy*18-py*4);});
    return;
  }
  if(job==='summoner'){
    const len=40, tipX=gripX+ux*len, tipY=gripY+uy*len;
    line(1,1.8,()=>{ctx.moveTo(gripX-ux*7,gripY-uy*7);ctx.lineTo(tipX,tipY);});
    orb(tipX,tipY,6,.9); orb(tipX+px*9,tipY+py*9,3,.55); orb(tipX-px*9,tipY-py*9,3,.55);
    return;
  }
  if(job==='mage'){
    const len=42, tipX=gripX+ux*len, tipY=gripY+uy*len;
    line(1,1.65,()=>{ctx.moveTo(gripX-ux*6,gripY-uy*6);ctx.lineTo(tipX,tipY);});
    orb(tipX,tipY,7,.95); line(.65,1,()=>{ctx.moveTo(tipX-7,tipY);ctx.lineTo(tipX+7,tipY);ctx.moveTo(tipX,tipY-7);ctx.lineTo(tipX,tipY+7);});
    return;

  if(job==='hexer'){
    const len=38, tipX=gripX+ux*len, tipY=gripY+uy*len;
    line(1,1.75,()=>{ctx.moveTo(gripX-ux*7,gripY-uy*7);ctx.lineTo(tipX,tipY);});
    line(.9,1.4,()=>{ctx.arc(tipX+px*4,tipY+py*4,10,bladeAngle-Math.PI*.15,bladeAngle+Math.PI*.95);});
    return;
  }
  if(job==='mechanic'){
    const len=34, tipX=gripX+ux*len, tipY=gripY+uy*len;
    line(1,2,()=>{ctx.moveTo(gripX-ux*7,gripY-uy*7);ctx.lineTo(tipX,tipY);});
    line(.9,1.25,()=>{ctx.rect(tipX-6,tipY-6,12,12);ctx.moveTo(tipX-11,tipY);ctx.lineTo(tipX+11,tipY);ctx.moveTo(tipX,tipY-11);ctx.lineTo(tipX,tipY+11);});
    return;
  }
  if(job==='mirror'){
    const sx=gripX+ux*20, sy=gripY+uy*20;
    line(1,1.9,()=>{ctx.moveTo(gripX,gripY);ctx.lineTo(sx,sy);ctx.lineTo(sx+px*10,sy+py*10);ctx.lineTo(sx+ux*9,sy+uy*9);ctx.lineTo(sx-px*10,sy-py*10);ctx.closePath();});
    line(.7,1,()=>{ctx.moveTo(sx-px*7,sy-py*7);ctx.lineTo(sx+px*7,sy+py*7);ctx.moveTo(sx,sy);ctx.lineTo(sx+ux*8,sy+uy*8);});
    return;
  }
  if(job==='assassin'){
    const len=23, tipX=gripX+ux*len, tipY=gripY+uy*len;
    line(1,1.8,()=>{ctx.moveTo(gripX-ux*5,gripY-uy*5);ctx.lineTo(tipX,tipY);ctx.moveTo(tipX,tipY);ctx.lineTo(tipX-ux*5+px*3,tipY-uy*5+py*3);ctx.moveTo(tipX,tipY);ctx.lineTo(tipX-ux*5-px*3,tipY-uy*5-py*3);});
    const a2=-Math.PI*.42-atkP*.25, u2x=Math.cos(a2), u2y=Math.sin(a2);
    line(.85,1.55,()=>{ctx.moveTo(leftGripX,leftGripY);ctx.lineTo(leftGripX+u2x*20,leftGripY+u2y*20);});
    return;
  }
  if(job==='paladin'){

  }
  if(job==='alchemist'){
    const len=26, tipX=gripX+ux*len, tipY=gripY+uy*len;
    line(1,1.7,()=>{ctx.moveTo(gripX-ux*7,gripY-uy*7);ctx.lineTo(tipX,tipY);});

  }
  // 기본 검투사: 직검
  const handleLen=8, bladeLen=34, guardLen=12;
  const baseX=gripX+ux*3, baseY=gripY+uy*3, tipX=baseX+ux*bladeLen, tipY=baseY+uy*bladeLen, backX=gripX-ux*handleLen, backY=gripY-uy*handleLen;
  const gx=px*guardLen/2, gy=py*guardLen/2, edgeW=2.1;
  line(.85,1.5,()=>{ctx.moveTo(gripX,gripY);ctx.lineTo(backX,backY);});
  orb(backX,backY,1.5,.7);
  line(.95,1.35,()=>{ctx.moveTo(gripX-gx,gripY-gy);ctx.lineTo(gripX+gx,gripY+gy);});
  line(1,1.85,()=>{ctx.moveTo(baseX+px*edgeW,baseY+py*edgeW);ctx.lineTo(tipX,tipY);ctx.lineTo(baseX-px*edgeW,baseY-py*edgeW);});
  line(.7,.95,()=>{ctx.moveTo(baseX,baseY);ctx.lineTo(tipX,tipY);});
}

function angleLerp(a,b,t){
  if(!Number.isFinite(a))return b;
  if(!Number.isFinite(b))return a;
  const d=Math.atan2(Math.sin(b-a),Math.cos(b-a));
  return a+d*clamp(t,0,1);
}
function stableWeaponFace(target){
  target=Number.isFinite(target)?target:-Math.PI/2;
  const movingAuto=!!player.autoMode&&!!player.movingAnim&&player.attackAnim<=0;
  const rate=movingAuto?.075:.22;
  player.weaponFace=angleLerp(player.weaponFace,target,rate);
  return player.weaponFace;
}
function drawPlayer(){const x=player.x,y=player.y;ctx.save();ctx.translate(x,y);

function fullMapBounds(){
  // 전체맵 팝업은 미니맵 확대가 아니라 현재 구역 전체 좌표를 한 정사각형 안에 넣는다.
  // 기본은 0~fieldSize 전체이며, 혹시 외곽 오브젝트가 밖으로 나간 경우도 포함해 잘림을 방지한다.
  const size=Math.max(1,Number(fieldSize)||1800);
  let left=0,top=0,right=size,bottom=size;
  const include=(x,y,r=0)=>{if(!Number.isFinite(x)||!Number.isFinite(y))return;left=Math.min(left,x-r);top=Math.min(top,y-r);right=Math.max(right,x+r);bottom=Math.max(bottom,y+r);};
  if(dungeonActive()&&dungeonMap){
    const ws=Array.isArray(dungeonMap.walkables)?dungeonMap.walkables:[];
    for(const a of ws){if(!a)continue;include(Number(a.x)||0,Number(a.y)||0,40);include((Number(a.x)||0)+(Number(a.w)||0),(Number(a.y)||0)+(Number(a.h)||0),40);}
    const segs=Array.isArray(dungeonMap.wallSegments)?dungeonMap.wallSegments:[];
    for(const s of segs){if(!s)continue;include(Number(s.x1)||0,Number(s.y1)||0,40);include(Number(s.x2)||0,Number(s.y2)||0,40);}
  }
  for(const m of monsters||[])if(m&&!m.dead)include(Number(m.x),Number(m.y),m.boss?90:42);
  for(const n of npcs||[])if(n)include(Number(n.x),Number(n.y),70);
  include(player.x,player.y,60);
  const w=Math.max(1,right-left),h=Math.max(1,bottom-top);
  const side=Math.max(w,h);
  const cx=(left+right)/2,cy=(top+bottom)/2;
  return {left:cx-side/2,top:cy-side/2,right:cx+side/2,bottom:cy+side/2};
}
function makeFullMapTransform(w,h){
  const pad=34,b=fullMapBounds();
  const bw=Math.max(1,b.right-b.left),bh=Math.max(1,b.bottom-b.top);
  const usableW=Math.max(1,w-pad*2), usableH=Math.max(1,h-pad*2);
  const s=Math.max(.001,Math.min(usableW/bw,usableH/bh));
  const ox=pad+(usableW-bw*s)/2,oy=pad+(usableH-bh*s)/2;
  return {pad,w,h,left:b.left,top:b.top,s,ox,oy,x(v){return ox+(v-this.left)*s;},y(v){return oy+(v-this.top)*s;}};
}

function handleRuntimeError(scope,e){
  const m=String((e&&e.message)||e||'unknown');
  try{console.warn('NEON runtime guarded',scope,m);}catch(_){}
  if(/Maximum call stack size exceeded|too much recursion/i.test(m)){
    if(!window.__neonStackGuardedToast){window.__neonStackGuardedToast=1;try{msg('반복 호출 오류를 차단했습니다.', 'system');}catch(_){}}
    return;
  }
  if(!window.__neonRuntimeErrorShown){window.__neonRuntimeErrorShown=1;try{msg('오류 차단: '+m,'system');}catch(_){}}
}
function loop(ts){

  requestAnimationFrame(loop);
}

async function hardResetRemoteGameState(client,uid){
  const table=SUPABASE_CONFIG.table;
  const resetPayload=makeDeletedAccountResetPayload();
  const row={
    user_id:uid,
    nickname:'플레이어',
    player_data:resetPayload,
    field_id:'town',
    x:Number(resetPayload.player.x)||900,
    y:Number(resetPayload.player.y)||900,
    level:1,
    job:'adventurer',
    hp:Number(resetPayload.player.hp)||100,
    updated_at:new Date().toISOString()
  };
  // 먼저 서버 값을 신규 상태로 덮어써서 delete policy가 막혀도 기존 성장 데이터가 되살아나지 않게 한다.
  const up=await client.from(table).upsert(row,{onConflict:'user_id'});
  if(up.error)throw up.error;
  // delete policy가 열려 있으면 실제 행도 삭제한다. 막혀도 이미 reset row라서 기존 데이터는 복원되지 않는다.
  try{await client.from(table).delete().eq('user_id',uid);}catch(e){console.warn('delete blocked, reset row kept',e);}
  const verify=await client.from(table).select('player_data,level,job').eq('user_id',uid).maybeSingle();
  if(verify.error&&verify.error.code!=='PGRST116')throw verify.error;
  if(verify.data&&!(verify.data.player_data&&verify.data.player_data.accountDeleted)){
    throw new Error('서버 초기화 검증 실패');
  }
  return true;
}

function ensureOnlineHubConnection(refresh=false,force=false){
  if(!cloudState.user){onlineState.status='로그인 필요';onlineState.enabled=false;return;}
  if(typeof document!=='undefined'&&document.hidden&&!force)return;
  if(onlineState.enabled&&!force)return;
  if(onlineState.connecting)return;
  const now=performance.now();
  if(force&&onlineState.lastConnectTry&&now-onlineState.lastConnectTry<1200)return;
  onlineState.lastConnectTry=now;
  onlineState.blocked=false;
  onlineState.drawBlocked=false;
  onlineState.status='접속 중';
  initPartyPresence(force).then(ok=>{
    if(ok)trackOnlinePresence(true);
    if(refresh&&popupMode==='onlineHub')setTimeout(()=>showOnlineHub(false),800);
  });
}
function forceOnlineKeepAlive(){
  if(!cloudState.user)return;
  if(typeof document!=='undefined'&&document.hidden)return;
  if(onlineState.enabled&&onlineState.channel)return;
  const now=performance.now();
  if(!onlineState.connecting&&(!onlineState.lastConnectTry||now-onlineState.lastConnectTry>7000)){
    onlineState.lastConnectTry=now;
    ensureOnlineHubConnection(popupMode==='onlineHub',true);
  }
}
function onlineKeepAliveTick(reason='heartbeat'){
  try{
    if(!cloudState.user||cloudState.deleting||cloudState.accountResetting)return false;
    if(typeof document!=='undefined'&&document.hidden)return false;
    const now=performance.now();
    if(onlineState.enabled&&onlineState.channel){
      if(!onlineState.sending&&now-(onlineState.lastHeartbeat||0)>4200){
        trackOnlinePresence(true);
      }
      return true;
    }
    if(!onlineState.connecting){
      scheduleOnlineReconnect(reason,350);
    }
    return false;
  }catch(e){
    console.error(e);
    return false;
  }
}
function startOnlineKeepAlive(){
  if(onlineState.keepAliveTimer)return;
  onlineState.keepAliveTimer=setInterval(()=>onlineKeepAliveTick('interval'),5000);
}

function worldPointFromClient(clientX,clientY){
  const r=game.getBoundingClientRect();

function peerAtClient(clientX,clientY){
  if(popupLayer&&popupLayer.style.display==='flex')return null;
  const pt=worldPointFromClient(clientX,clientY);
  const now=performance.now();
  let best=null,bd=46;
  for(const id in onlineState.peers||{}){
    const p=onlineState.peers[id];
    if(!p||p.field!==currentField||now-(p.seenAt||0)>ONLINE_PEER_DRAW_MS)continue;
    const x=Number.isFinite(Number(p.drawX))?Number(p.drawX):Number(p.x);
    const y=Number.isFinite(Number(p.drawY))?Number(p.drawY):Number(p.y);
    if(!Number.isFinite(x)||!Number.isFinite(y))continue;
    const d=Math.hypot(pt.x-x,pt.y-(y-8));
    if(d<bd){bd=d;best=p;}
  }
  return best;
}

function gameSafeCall(name,...args){
  try{
    const fn=window.Game&&window.Game[name];
    if(typeof fn==='function')return fn(...args);
    const g=window[name]||globalThis[name];
    if(typeof g==='function')return g(...args);
    console.warn('missing Game action',name,args);
    if(typeof toast==='function')toast('기능 준비 중');
    return null;
  }catch(e){
    console.error(e);
    if(typeof toast==='function')toast('기능 오류 차단');
    return null;
  }
}
function safeShowPeerAction(id){

function devDummyInitialField(idx=0){
  try{
    const stages=typeof stageFields==='function'?stageFields():[];
    if(stages&&stages.length)return stages[Math.abs(idx)%stages.length];
  }catch(_){ }
  try{return FIELDS.find(f=>f.id==='plain')||FIELDS.find(f=>f.id!=='town')||FIELDS[0];}catch(_){return {id:'plain',size:2200,name:'초원'};}
}
function devDummyRandomPointForField(fieldId,idx=0){
  const size=typeof devDummyFieldSize==='function'?devDummyFieldSize(fieldId):(fieldSize||2200);
  const seed=(idx+1)*997+(Date.now()%7919);
  const baseX=160+((seed*37)%Math.max(220,size-320));
  const baseY=160+((seed*53)%Math.max(220,size-320));
  return {x:clamp(baseX,60,size-60),y:clamp(baseY,60,size-60)};
}
function devDummyNormalizeIndependentState(d,profile,idx=0,created=false){
  if(!d)return d;
  d.id=profile.id; d.userId=profile.id; d.profileId=profile.id; d.devDummy=true;
  d.name=devDummyNickname(profile); d.job=profile.job; d.jobName=profile.jobName;
  d.seenAt=performance.now(); d.ts=Date.now();
  if(!onlineState.partyId){d.partyId='';d.partyOwnerId='';}
  if(!devDummyInParty(d)){
    const f=stageField(d.field)||FIELDS.find(x=>x.id===d.field);
    if(created||!f){
      const init=devDummyInitialField(idx);
      const p=devDummyRandomPointForField(init.id,idx);
      d.field=init.id; d.x=p.x; d.y=p.y; d.drawX=p.x; d.drawY=p.y; d.targetX=p.x; d.targetY=p.y;
      d.aiTargetField=init.id;
    }
    if(!Number.isFinite(Number(d.aiRoamX))||!Number.isFinite(Number(d.aiRoamY))){
      const p=devDummyRandomPointForField(d.field,idx+3);
      d.aiRoamX=p.x; d.aiRoamY=p.y; d.aiRoamTimer=2+idx*.7;
    }
    d.aiState=d.aiState||'개별 자율활동';
  }
  return d;
}
function ensureDevDummies(){
  if(!onlineState.peers)onlineState.peers={};
  if(!devDummyModeActive()){
    for(const id of devDummyIds())delete onlineState.peers[id];
    return [];
  }
  return DEV_DUMMY_PROFILES.map((profile,idx)=>{
    let d=onlineState.peers[profile.id];
    const created=!d||!d.devDummy;
    if(created)d=makeDevDummyPeer(profile,idx);
    d=devDummyNormalizeIndependentState(d,profile,idx,created);
    onlineState.peers[profile.id]=d;
    return d;
  });
}
function devDummyPickRoamPoint(d,idx=0){
  const size=devDummyFieldSize(d.field);
  let p=null;
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2;
    const r=120+Math.random()*420;
    const x=clamp((Number(d.x)||size/2)+Math.cos(a)*r,70,size-70);
    const y=clamp((Number(d.y)||size/2)+Math.sin(a)*r,70,size-70);
    p={x,y};
    if(d.field!==currentField)break;
    try{if(!dungeonActive()||dungeonPointWalkable(x,y,18))break;}catch(_){break;}
  }
  if(!p)p=devDummyRandomPointForField(d.field,idx+11);
  d.aiRoamX=p.x; d.aiRoamY=p.y; d.aiRoamTimer=3.5+Math.random()*4.5+idx*.35;
}
function devDummyAutonomousSim(d,dt,st){
  if(!d)return;
  const idx=Math.max(0,devDummyIds().indexOf(d.id));
  d.aiThink=(Number(d.aiThink)||0)-dt;
  d.aiPortal=(Number(d.aiPortal)||0)-dt;
  d.aiShop=(Number(d.aiShop)||0)-dt;
  d.aiRoamTimer=(Number(d.aiRoamTimer)||0)-dt;
  if(!d.field||!FIELDS.find(f=>f.id===d.field)){
    const f=devDummyInitialField(idx); const p=devDummyRandomPointForField(f.id,idx);
    d.field=f.id; d.x=p.x; d.y=p.y; d.drawX=p.x; d.drawY=p.y;
  }
  if(devDummyUpdatePortalMove(d,st,dt))return;
  const size=devDummyFieldSize(d.field);
  if(!Number.isFinite(Number(d.aiRoamX))||!Number.isFinite(Number(d.aiRoamY))||d.aiRoamTimer<=0||Math.hypot((Number(d.aiRoamX)||d.x)-d.x,(Number(d.aiRoamY)||d.y)-d.y)<42){
    devDummyPickRoamPoint(d,idx);
  }
  if(d.aiThink<=0){
    d.aiThink=.85+Math.random()*1.35+idx*.08;
    if(d.field==='town'){
      devDummyGearShop(d,true);
      const next=devDummyBestField(d);
      if(next&&d.aiPortal<=0){d.aiPortal=9+Math.random()*7+idx;devDummyRequestPortal(d,next.id,'next');d.aiState=`${next.name||'사냥터'} 이동`;}
    }else{
      const f=stageField(d.field)||stageFields()[0];
      const lv=Number(f&&f.level||1);
      const hard=lv>Number(d.level||1)+4;
      if(hard){devDummyMaybeInvite(d,'bossHard');devDummyGain(d,10+lv,7+lv);d.aiState='고난도 보스 견적중';}
      else{
        devDummyGain(d,12+lv*2,8+lv*1.5);
        if(Math.random()<.16)devDummyGearShop(d,false);
        d.aiCleared=d.aiCleared&&typeof d.aiCleared==='object'?d.aiCleared:{};
        d.aiDiscovered=d.aiDiscovered&&typeof d.aiDiscovered==='object'?d.aiDiscovered:{};
        if(Math.random()<.08||Number(d.level||1)>=lv+3){
          d.aiCleared[f.id]=true;
          const nx=nextStageId(f.id);
          if(nx){d.aiDiscovered[nx]=true;if(Math.random()<.36&&d.aiPortal<=0){d.aiPortal=12+Math.random()*8+idx;devDummyRequestPortal(d,nx,'next');d.aiState='다음 사냥터 확장';}}
        }
        if(Math.random()<.035&&d.aiPortal<=0){d.aiPortal=15+Math.random()*10+idx;devDummyRequestPortal(d,'town','town');d.aiState='상점 정비 이동';}
      }
    }
  }
  const ox=Number(d.x)||size/2, oy=Number(d.y)||size/2;
  const tx=clamp(Number(d.aiRoamX)||ox,60,size-60), ty=clamp(Number(d.aiRoamY)||oy,60,size-60);
  const dx=tx-ox, dy=ty-oy, gap=Math.hypot(dx,dy);
  if(gap>4){
    const a=Math.atan2(dy,dx);
    const speed=((st&&st.speed)||135)*(d.field===currentField?0.42:0.30);
    d.x=clamp(ox+Math.cos(a)*speed*dt,28,size-28);
    d.y=clamp(oy+Math.sin(a)*speed*dt,28,size-28);
    d.dir=a; d.moving=true; d.visualMoving=true;
    if(d.field===currentField){try{if(typeof resolveDungeonEntity==='function')resolveDungeonEntity(d,ox,oy,18);}catch(_){ }}
    const moved=Math.hypot(d.x-ox,d.y-oy);
    d.vx=moved>0?(d.x-ox)/Math.max(.016,dt):0; d.vy=moved>0?(d.y-oy)/Math.max(.016,dt):0;
  }else{d.moving=false; d.visualMoving=Number(d.attackAnim||0)>0;}
  d.targetX=d.x; d.targetY=d.y;
}
